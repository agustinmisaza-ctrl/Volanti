// ── PFD Canvas ────────────────────────────────────────────────────
function navInitPFD(){
  var cv=$('nav-pfd-canvas');if(!cv)return;
  // Wait for CSS layout to complete before reading dimensions
  if(cv.offsetWidth===0||cv.offsetHeight===0){setTimeout(navInitPFD,60);return;}
  var dpr=window.devicePixelRatio||1;
  var w=cv.offsetWidth,h=cv.offsetHeight;
  cv.width=w*dpr;cv.height=h*dpr;
  var ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
  function loop(){
    if(!$('nav-pfd-canvas')){return;}
    navDrawPFD(ctx,w,h);
    // Update inset map
    if(NAV._insetMap&&NAV._insetPlane){
      var d2=navCurr();
      NAV._insetPlane.setLatLng([d2.lat,d2.lng]);
      NAV._insetMap.setView([d2.lat,d2.lng]);
    }
    NAV._raf=requestAnimationFrame(loop);
  }
  loop();
}

function navDrawPFD(ctx,W,H){
  var d=navCurr();
  var pitch=d.pitch||0,roll=d.roll||0,hdg=(d.hdg||d.trk||0);
  var spd=d.spd||0,alt=d.alt||0,vs=d.vs||0;
  ctx.clearRect(0,0,W,H);
  var cx=W/2,cy=H/2;

  // === SVS SKY / GROUND ===
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(-roll*Math.PI/180);
  var pOff=pitch*(H/28);
  ctx.translate(0,pOff);
  // Sky
  var skyG=ctx.createLinearGradient(0,-H*1.5,0,0);
  skyG.addColorStop(0,'#0c4a6e');skyG.addColorStop(0.6,'#0284c7');skyG.addColorStop(1,'#38bdf8');
  ctx.fillStyle=skyG;ctx.fillRect(-W*2,-H*3,W*4,H*3);
  // Ground
  var gndG=ctx.createLinearGradient(0,0,0,H*1.5);
  gndG.addColorStop(0,'#854d0e');gndG.addColorStop(0.5,'#713f12');gndG.addColorStop(1,'#2c1a08');
  ctx.fillStyle=gndG;ctx.fillRect(-W*2,0,W*4,H*3);
  // Horizon
  ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-W*2,0);ctx.lineTo(W*2,0);ctx.stroke();
  // Pitch ladder
  ctx.strokeStyle='rgba(255,255,255,.8)';ctx.fillStyle='rgba(255,255,255,.85)';
  ctx.font='bold '+(W*0.03)+'px monospace';ctx.textAlign='center';
  var ppd=H/28;
  for(var deg=5;deg<=30;deg+=5){
    var len=deg%10===0?W*0.14:W*0.07;
    var lw=deg%10===0?1.5:.75;
    ctx.lineWidth=lw;
    ctx.beginPath();ctx.moveTo(-len/2,-deg*ppd);ctx.lineTo(len/2,-deg*ppd);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-len/2,deg*ppd);ctx.lineTo(len/2,deg*ppd);ctx.stroke();
    if(deg%10===0){
      ctx.fillText(deg,len/2+W*.05,-deg*ppd+4);ctx.fillText(deg,-len/2-W*.05,-deg*ppd+4);
      ctx.fillText(deg,len/2+W*.05,deg*ppd+4);ctx.fillText(deg,-len/2-W*.05,deg*ppd+4);
    }
  }
  ctx.restore();

  // === BANK INDICATOR (fixed arc) ===
  ctx.save();ctx.translate(cx,cy);
  ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(0,0,H*.43,-Math.PI*1.08,-Math.PI*.08);ctx.stroke();
  [10,20,30,45,60].forEach(function(a){
    var r1=H*.43,r2=H*.41;
    [-a,a].forEach(function(angle){
      var rad=(-90+angle)*Math.PI/180;
      ctx.beginPath();ctx.moveTo(Math.cos(rad)*r1,Math.sin(rad)*r1);ctx.lineTo(Math.cos(rad)*r2,Math.sin(rad)*r2);
      ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=1;ctx.stroke();
    });
  });
  // Roll pointer
  ctx.save();ctx.rotate(-roll*Math.PI/180);
  var rp=H*.41;
  ctx.fillStyle='#fff';ctx.beginPath();ctx.moveTo(0,-rp);ctx.lineTo(-5,-rp+10);ctx.lineTo(5,-rp+10);ctx.closePath();ctx.fill();
  ctx.restore();ctx.restore();

  // === FIXED AIRCRAFT SYMBOL ===
  ctx.save();ctx.translate(cx,cy+H*.03);
  ctx.strokeStyle='#fbbf24';ctx.fillStyle='rgba(0,0,0,.5)';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(-W*.22,0);ctx.lineTo(-W*.07,0);ctx.lineTo(-W*.07,H*.04);ctx.lineTo(-W*.22,H*.04);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.moveTo(W*.07,0);ctx.lineTo(W*.22,0);ctx.lineTo(W*.22,H*.04);ctx.lineTo(W*.07,H*.04);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(0,H*.02,W*.012,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // === SPEED TAPE (left) ===
  var tw=W*.13,th=H*.72,tx=0,ty=(H-th)/2;
  ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(tx,ty,tw,th);
  ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=.5;ctx.strokeRect(tx,ty,tw,th);
  // Green arc 105–270 marker
  ctx.fillStyle='rgba(34,197,94,.7)';ctx.fillRect(tx+tw-4,ty+(th/2)+Math.min((270-spd)*(th/150),th/2-4),4,Math.max(0,Math.min(th*.55,(270-105)*(th/150))));
  ctx.save();ctx.beginPath();ctx.rect(tx,ty,tw,th);ctx.clip();
  var pkt=th/80;
  for(var kv=Math.floor((spd-44)/10)*10;kv<=spd+50;kv+=10){
    var ky=ty+th/2+(spd-kv)*pkt;
    if(ky<ty||ky>ty+th)continue;
    ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=.75;
    ctx.beginPath();ctx.moveTo(tx+tw-8,ky);ctx.lineTo(tx+tw,ky);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.75)';ctx.font='bold '+(tw*.32)+'px monospace';ctx.textAlign='right';
    ctx.fillText(kv,tx+tw-10,ky+4);
  }
  ctx.restore();
  // Red line Vne
  var vneY=ty+th/2+(spd-280)*pkt;
  if(vneY>=ty&&vneY<=ty+th){ctx.fillStyle='#ef4444';ctx.fillRect(tx+tw-6,vneY-1,6,2);}
  var bh=H*.065;
  ctx.fillStyle='#000';ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
  ctx.fillRect(tx,cy-bh/2,tw,bh);ctx.strokeRect(tx,cy-bh/2,tw,bh);
  ctx.fillStyle='#fff';ctx.font='bold '+(bh*.6)+'px monospace';ctx.textAlign='center';
  ctx.fillText(Math.round(spd),tx+tw/2,cy+bh*.2);
  ctx.fillStyle='#0BA5B0';ctx.font='bold '+(W*.022)+'px monospace';ctx.textAlign='center';
  ctx.fillText('KTS',tx+tw/2,ty+10);

  // === ALTITUDE TAPE (right) ===
  var atx=W-tw,aty=ty;
  ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(atx,aty,tw,th);
  ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=.5;ctx.strokeRect(atx,aty,tw,th);
  ctx.save();ctx.beginPath();ctx.rect(atx,aty,tw,th);ctx.clip();
  var p100=th/800;
  for(var av=Math.floor((alt-400)/100)*100;av<=alt+500;av+=100){
    var ay=aty+th/2+(alt-av)*p100;
    if(ay<aty||ay>aty+th)continue;
    ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=.75;
    ctx.beginPath();ctx.moveTo(atx,ay);ctx.lineTo(atx+8,ay);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.75)';ctx.font='bold '+(tw*.3)+'px monospace';ctx.textAlign='left';
    ctx.fillText(av,atx+10,ay+4);
  }
  ctx.restore();
  ctx.fillStyle='#000';ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
  ctx.fillRect(atx,cy-bh/2,tw,bh);ctx.strokeRect(atx,cy-bh/2,tw,bh);
  ctx.fillStyle='#fff';ctx.font='bold '+(bh*.6)+'px monospace';ctx.textAlign='center';
  ctx.fillText(Math.round(alt/100)*100,atx+tw/2,cy+bh*.2);
  ctx.fillStyle='#0BA5B0';ctx.font='bold '+(W*.022)+'px monospace';ctx.textAlign='center';
  ctx.fillText('ALT',atx+tw/2,aty+10);

  // VSI bug
  var vsiMaxFPM=2000,vsiH=th*.6,vsiY=cy-vsiH/2,vsiX=atx+tw;
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(vsiX,vsiY,8,vsiH);
  var vsiPos=vsiY+vsiH/2-(Math.max(-vsiMaxFPM,Math.min(vsiMaxFPM,vs))/vsiMaxFPM)*(vsiH/2);
  ctx.fillStyle='#d946ef';ctx.beginPath();ctx.arc(vsiX+4,vsiPos,4,0,Math.PI*2);ctx.fill();

  // === HSI COMPASS STRIP (bottom) ===
  var hsiH=H*.1,hsiY=H-hsiH;
  ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(0,hsiY,W,hsiH);
  ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,hsiY);ctx.lineTo(W,hsiY);ctx.stroke();
  ctx.save();ctx.beginPath();ctx.rect(tw,hsiY,W-tw*2,hsiH);ctx.clip();
  var ppHsi=W/60;
  for(var hd=-40;hd<=40;hd+=5){
    var hx=cx+(hd)*ppHsi;
    var hdA=((hdg+hd)+360)%360;
    var isM=hdA%10===0;
    ctx.strokeStyle='rgba(255,255,255,'+(isM?.65:.3)+')';ctx.lineWidth=isM?1.25:.6;
    ctx.beginPath();ctx.moveTo(hx,hsiY);ctx.lineTo(hx,hsiY+(isM?hsiH*.38:hsiH*.2));ctx.stroke();
    if(isM){
      var lbl=hdA===0?'N':hdA===90?'E':hdA===180?'S':hdA===270?'W':(hdA/10).toString().padStart(2,'0');
      ctx.fillStyle='rgba(255,255,255,.85)';ctx.font='bold '+(hsiH*.28)+'px monospace';ctx.textAlign='center';
      ctx.fillText(lbl,hx,hsiY+hsiH*.72);
    }
  }
  ctx.restore();
  // Lubber
  ctx.fillStyle='#fff';ctx.beginPath();ctx.moveTo(cx-4,hsiY);ctx.lineTo(cx+4,hsiY);ctx.lineTo(cx,hsiY+hsiH*.33);ctx.closePath();ctx.fill();
  // Heading box
  ctx.fillStyle='#000';ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
  ctx.fillRect(cx-24,hsiY+hsiH*.43,48,hsiH*.46);ctx.strokeRect(cx-24,hsiY+hsiH*.43,48,hsiH*.46);
  ctx.fillStyle='#fff';ctx.font='bold '+(hsiH*.35)+'px monospace';ctx.textAlign='center';
  ctx.fillText(Math.round(hdg).toString().padStart(3,'0')+'°',cx,hsiY+hsiH*.8);
}

// ── SixPack Canvas ────────────────────────────────────────────────
function navInitSixPack(){
  var cv=$('nav-six-canvas');if(!cv)return;
  if(cv.offsetWidth===0||cv.offsetHeight===0){setTimeout(navInitSixPack,60);return;}
  var dpr=window.devicePixelRatio||1;
  var w=cv.offsetWidth,h=cv.offsetHeight;
  cv.width=w*dpr;cv.height=h*dpr;
  var ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
  function loop(){if(!$('nav-six-canvas'))return;navDrawSixPack(ctx,w,h);NAV._raf=requestAnimationFrame(loop);}
  loop();
}

function navDrawSixPack(ctx,W,H){
  var d=navCurr();
  var pitch=d.pitch||0,roll=d.roll||0,hdg=(d.hdg||d.trk||0);
  var spd=d.spd||0,alt=d.alt||0,vs=d.vs||0;
  ctx.fillStyle='#030303';ctx.fillRect(0,0,W,H);
  var cw=W/3,ch=H/2,r=Math.min(cw,ch)*.42;
  var instruments=[
    {n:'ASI',c:0,r:0},{n:'AI',c:1,r:0},{n:'ALT',c:2,r:0},
    {n:'TC',c:0,r:1},{n:'DG',c:1,r:1},{n:'VSI',c:2,r:1}
  ];
  instruments.forEach(function(inst){
    var cx=cw*inst.c+cw/2,cy=ch*inst.r+ch/2;
    // Bezel
    var bg=ctx.createRadialGradient(cx,cy-r*.2,0,cx,cy,r);
    bg.addColorStop(0,'#1a1a1a');bg.addColorStop(1,'#080808');
    ctx.fillStyle=bg;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#2a2a2a';ctx.lineWidth=3;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.beginPath();ctx.arc(cx,cy,r*.97,0,Math.PI*2);ctx.stroke();
    if(inst.n==='ASI') navDrawASI(ctx,cx,cy,r,spd);
    else if(inst.n==='AI') navDrawAI(ctx,cx,cy,r,pitch,roll);
    else if(inst.n==='ALT') navDrawALT(ctx,cx,cy,r,alt);
    else if(inst.n==='TC') navDrawTC(ctx,cx,cy,r,roll,0);
    else if(inst.n==='DG') navDrawDG(ctx,cx,cy,r,hdg);
    else if(inst.n==='VSI') navDrawVSI(ctx,cx,cy,r,vs);
  });
}

// Generic instrument needle
function navNeedle(ctx,cx,cy,r,angle,color,lenFactor){
  ctx.save();ctx.translate(cx,cy);ctx.rotate(angle);
  ctx.fillStyle=color;ctx.shadowColor=color;ctx.shadowBlur=2;
  ctx.beginPath();ctx.moveTo(-r*.025,0);ctx.lineTo(0,-r*(lenFactor||.8));ctx.lineTo(r*.025,0);ctx.closePath();ctx.fill();
  ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(0,0,r*.07,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#555';ctx.lineWidth=.5;ctx.beginPath();ctx.arc(0,0,r*.07,0,Math.PI*2);ctx.stroke();
  ctx.restore();
}

// Generic tick ring
function navTicks(ctx,cx,cy,r,from,to,step,majStep,labelFn,sweep,startAngle){
  sweep=sweep||270;startAngle=startAngle||-225;
  for(var v=from;v<=to;v+=step){
    var pct=(v-from)/(to-from);
    var a=(startAngle+pct*sweep)*Math.PI/180;
    var isMaj=(Math.round(v)%majStep===0);
    var r1=isMaj?r*.85:r*.88,r2=r*.94;
    ctx.strokeStyle='rgba(255,255,255,'+(isMaj?.7:.4)+')';ctx.lineWidth=isMaj?1.5:.6;
    ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1);ctx.lineTo(cx+Math.cos(a)*r2,cy+Math.sin(a)*r2);ctx.stroke();
    if(isMaj&&labelFn){
      var lx=cx+Math.cos(a)*r*.72,ly=cy+Math.sin(a)*r*.72;
      ctx.fillStyle='rgba(255,255,255,.85)';ctx.font='bold '+(r*.13)+'px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(labelFn(v),lx,ly);
    }
  }
}

function navDrawASI(ctx,cx,cy,r,spd){
  navTicks(ctx,cx,cy,r,0,320,10,50,function(v){return v;},270,-225);
  // Green arc
  ctx.strokeStyle='rgba(34,197,94,.7)';ctx.lineWidth=r*.04;ctx.beginPath();
  ctx.arc(cx,cy,r*.88,(-225+105*(270/320))*Math.PI/180,(-225+270*(270/320))*Math.PI/180);ctx.stroke();
  // White arc
  ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=r*.025;ctx.beginPath();
  ctx.arc(cx,cy,r*.92,(-225+60*(270/320))*Math.PI/180,(-225+200*(270/320))*Math.PI/180);ctx.stroke();
  // Red line Vne
  var a=(-225+280*(270/320))*Math.PI/180;
  ctx.strokeStyle='rgba(239,68,68,.9)';ctx.lineWidth=r*.035;
  ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*r*.84,cy+Math.sin(a)*r*.84);ctx.lineTo(cx+Math.cos(a)*r*.94,cy+Math.sin(a)*r*.94);ctx.stroke();
  ctx.fillStyle='#0BA5B0';ctx.font='bold '+(r*.12)+'px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('KIAS',cx,cy+r*.38);
  var na=(-225+Math.min(320,Math.max(0,spd))*(270/320))*Math.PI/180;
  navNeedle(ctx,cx,cy,r,na,'#fff',.82);
}

function navDrawAI(ctx,cx,cy,r,pitch,roll){
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,r*.94,0,Math.PI*2);ctx.clip();
  ctx.save();ctx.translate(cx,cy);ctx.rotate(-roll*Math.PI/180);
  var po=pitch*(r/22);ctx.translate(0,-po);
  var sg=ctx.createLinearGradient(0,-r*2,0,0);
  sg.addColorStop(0,'#0c4a6e');sg.addColorStop(1,'#38bdf8');
  ctx.fillStyle=sg;ctx.fillRect(-r*2,-r*4,r*4,r*4);
  var gg=ctx.createLinearGradient(0,0,0,r*2);
  gg.addColorStop(0,'#854d0e');gg.addColorStop(1,'#1c0a00');
  ctx.fillStyle=gg;ctx.fillRect(-r*2,0,r*4,r*4);
  ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-r*2,0);ctx.lineTo(r*2,0);ctx.stroke();
  var ppd2=r/22;
  for(var deg2=5;deg2<=30;deg2+=5){
    var ll=deg2%10===0?r*.28:r*.14;
    ctx.lineWidth=deg2%10===0?1.2:.6;
    ctx.strokeStyle='rgba(255,255,255,.7)';
    ctx.beginPath();ctx.moveTo(-ll,-deg2*ppd2);ctx.lineTo(ll,-deg2*ppd2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-ll,deg2*ppd2);ctx.lineTo(ll,deg2*ppd2);ctx.stroke();
  }
  ctx.restore();ctx.restore();
  // Aircraft symbol
  ctx.save();ctx.translate(cx,cy);
  ctx.strokeStyle='#fbbf24';ctx.fillStyle='rgba(0,0,0,.3)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(-r*.42,r*.04);ctx.lineTo(-r*.1,r*.04);ctx.lineTo(-r*.1,r*.1);ctx.lineTo(-r*.42,r*.1);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.moveTo(r*.1,r*.04);ctx.lineTo(r*.42,r*.04);ctx.lineTo(r*.42,r*.1);ctx.lineTo(r*.1,r*.1);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(0,r*.07,r*.04,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // Bank scale ticks
  [10,20,30,45,60].forEach(function(angle){
    [-angle,angle].forEach(function(a){
      var rad=(-90+a)*Math.PI/180;
      ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=Math.abs(a)>=30?1.2:.7;
      ctx.beginPath();ctx.moveTo(cx+Math.cos(rad)*r*.9,cy+Math.sin(rad)*r*.9);ctx.lineTo(cx+Math.cos(rad)*r*.97,cy+Math.sin(rad)*r*.97);ctx.stroke();
    });
  });
  // Roll pointer
  ctx.save();ctx.translate(cx,cy);ctx.rotate(-roll*Math.PI/180);
  ctx.fillStyle='#fff';ctx.beginPath();ctx.moveTo(0,-r*.9);ctx.lineTo(-4,-r*.83);ctx.lineTo(4,-r*.83);ctx.closePath();ctx.fill();
  ctx.restore();
}

function navDrawALT(ctx,cx,cy,r,alt){
  navTicks(ctx,cx,cy,r,0,9,1,1,function(v){return v;},324,-162);
  ctx.fillStyle='rgba(255,255,255,.8)';ctx.font='bold '+(r*.11)+'px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('ALTITUDE',cx,cy+r*.38);
  // Kollsman window
  ctx.fillStyle='#111';ctx.strokeStyle='#555';ctx.lineWidth=.75;
  ctx.fillRect(cx+r*.52,cy-r*.08,r*.42,r*.17);ctx.strokeRect(cx+r*.52,cy-r*.08,r*.42,r*.17);
  ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='bold '+(r*.1)+'px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('29.92',cx+r*.73,cy+r*.005);
  // 3 hands: 10k, 1k, 100ft
  navNeedle(ctx,cx,cy,r,(alt/100000)*Math.PI*2,'rgba(255,255,255,.6)',.6);
  navNeedle(ctx,cx,cy,r,(alt/10000)*Math.PI*2,'rgba(255,255,255,.8)',.75);
  navNeedle(ctx,cx,cy,r,(alt/1000)*Math.PI*2,'#fff',.86);
}

function navDrawTC(ctx,cx,cy,r,roll){
  ctx.fillStyle='rgba(255,255,255,.8)';ctx.font='bold '+(r*.12)+'px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('L',cx-r*.68,cy);ctx.fillText('R',cx+r*.68,cy);ctx.fillText('2 MIN',cx,cy+r*.65);
  ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillRect(cx-r*.9,cy-r*.04,r*.18,r*.08);ctx.fillRect(cx+r*.72,cy-r*.04,r*.18,r*.08);
  // Standard rate marks
  [[-20,cy-r*.02],[20,cy-r*.02]].forEach(function(m){});
  ctx.save();ctx.translate(cx,cy);ctx.rotate(roll*Math.PI/180);
  ctx.strokeStyle='rgba(255,255,255,.9)';ctx.fillStyle='#fff';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(-r*.6,r*.04);ctx.lineTo(-r*.15,r*.04);ctx.lineTo(-r*.15,r*.1);ctx.lineTo(-r*.6,r*.1);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(r*.15,r*.04);ctx.lineTo(r*.6,r*.04);ctx.lineTo(r*.6,r*.1);ctx.lineTo(r*.15,r*.1);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.arc(0,r*.06,r*.035,0,Math.PI*2);ctx.fillStyle='#111';ctx.fill();ctx.strokeStyle='#fbbf24';ctx.lineWidth=1.5;ctx.stroke();
  ctx.restore();
  // Slip ball
  ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx-r*.3,cy+r*.6);ctx.quadraticCurveTo(cx,cy+r*.65,cx+r*.3,cy+r*.6);ctx.stroke();
  ctx.fillStyle='#333';ctx.strokeStyle='#fff';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(cx,cy+r*.61,r*.06,0,Math.PI*2);ctx.fill();ctx.stroke();
}

function navDrawDG(ctx,cx,cy,r,hdg){
  ctx.save();ctx.translate(cx,cy);ctx.rotate(-hdg*Math.PI/180);
  ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=.5;ctx.beginPath();ctx.arc(0,0,r*.85,0,Math.PI*2);ctx.stroke();
  for(var i=0;i<36;i++){
    var a=i*10*Math.PI/180;
    var isMajDG=i%3===0;
    ctx.strokeStyle='rgba(255,255,255,'+(isMajDG?.65:.3)+')';ctx.lineWidth=isMajDG?1.5:.6;
    ctx.beginPath();ctx.moveTo(Math.cos(a)*r*(isMajDG?.78:.84),Math.sin(a)*r*(isMajDG?.78:.84));
    ctx.lineTo(Math.cos(a)*r*.9,Math.sin(a)*r*.9);ctx.stroke();
    if(isMajDG){
      var labDG=['N','3','6','E','12','15','S','21','24','W','30','33'][i/3];
      var lx=Math.cos(a)*r*.67,ly=Math.sin(a)*r*.67;
      ctx.fillStyle='rgba(255,255,255,.85)';ctx.font='bold '+(r*(labDG&&labDG.length===1?.18:.12))+'px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.save();ctx.translate(lx,ly);ctx.rotate(-(-hdg*Math.PI/180)+a);ctx.fillText(labDG,0,0);ctx.restore();
    }
  }
  // Heading bug
  var bugA=(NAV.hdgBug)*Math.PI/180;
  ctx.fillStyle='#d946ef';ctx.beginPath();ctx.moveTo(Math.cos(bugA)*r*.8,Math.sin(bugA)*r*.8);
  ctx.lineTo(Math.cos(bugA-0.1)*r*.7,Math.sin(bugA-0.1)*r*.7);ctx.lineTo(Math.cos(bugA+0.1)*r*.7,Math.sin(bugA+0.1)*r*.7);ctx.closePath();ctx.fill();
  ctx.restore();
  // Fixed aircraft symbol
  ctx.save();ctx.translate(cx,cy);
  ctx.fillStyle='#f97316';
  ctx.beginPath();ctx.moveTo(0,-r*.3);ctx.lineTo(-r*.25,r*.15);ctx.lineTo(0,r*.05);ctx.lineTo(r*.25,r*.15);ctx.closePath();ctx.fill();
  ctx.restore();
}

function navDrawVSI(ctx,cx,cy,r,vs){
  navTicks(ctx,cx,cy,r,-20,20,2,5,function(v){return Math.abs(v);},340,-170);
  ctx.fillStyle='rgba(255,255,255,.8)';ctx.font='bold '+(r*.1)+'px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('UP',cx,cy-r*.48);ctx.fillText('DN',cx,cy+r*.48);ctx.fillText('FPM×100',cx,cy+r*.32);
  var vsI=Math.max(-2000,Math.min(2000,vs));
  var vsA=(-170+(vsI/2000+1)/2*340)*Math.PI/180;
  navNeedle(ctx,cx,cy,r,vsA,'#fff',.82);
}

// ── Action handlers ───────────────────────────────────────────────
function navSelectApt(apt){
  NAV.selApt=apt;
  // Fetch METAR
  if(!NAV._aptMetar[apt.id]){
    NAV._aptMetar[apt.id]='Fetching...';
    fetch('https://aviationweather.gov/api/data/metar?ids='+apt.id+'&format=json')
      .then(function(r){return r.json();})
      .then(function(data){
        if(data&&data.length&&data[0].rawOb){
          NAV._aptMetar[apt.id]=data[0].rawOb;
        } else {
          NAV._aptMetar[apt.id]='No METAR available for '+apt.id;
        }
        var el=$('nav-metar-'+apt.id);
        if(el)el.textContent=NAV._aptMetar[apt.id];
      })
      .catch(function(){NAV._aptMetar[apt.id]='Weather unavailable';});
  }
  go('navscreen');
}

function navDirectTo(id){
  var apt=NAV_APTS.find(function(a){return a.id===id;})||{id:id,lat:APTS[id]&&APTS[id].lat,lng:APTS[id]&&APTS[id].lng};
  S.pfTo=id;
  if(apt.lat&&NAV._map){
    var d=navCurr();
    if(NAV._route){try{NAV._map.removeLayer(NAV._route);}catch(e){}}
    NAV._route=L.polyline([[d.lat,d.lng],[apt.lat,apt.lng]],{color:'#d946ef',weight:3}).addTo(NAV._map);
  }
  NAV.selApt=null;
  showToast('Direct to '+id+' set','ok');
  go('navscreen');
}

function navDownloadOffline(){showToast('Caching current view for offline...','ok');}

// ═══ WEATHER RADAR ═══════════════════════════════════════════════
var _wxMap=null, _wxLayer=null, _radarMode='radar';

function initRadar(){
  var el=$('wx-map');if(!el||_wxMap)return;
  try{
    // Center on aircraft home airport if known
    var aptCoord=APTS[S.pfFrom]||{lat:25.8,lng:-80.3};
    _wxMap=L.map('wx-map',{zoomControl:false,attributionControl:false,dragging:true,scrollWheelZoom:false}).setView([aptCoord.lat,aptCoord.lng],7);
    // Base map
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:12,opacity:0.6,attribution:''}).addTo(_wxMap);
    // Add radar layer from RainViewer (free, no key needed)
    loadRadarLayer();
    var upd=$('wx-updated');if(upd)upd.textContent='Live · '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  }catch(e){}
}

async function loadRadarLayer(){
  if(!_wxMap)return;
  if(_wxLayer){try{_wxLayer.remove();}catch(e){}_wxLayer=null;}
  var upd=$('wx-updated');

  if(_radarMode==='radar'){
    // Primary: compute timestamp directly — no fetch needed (RainViewer updates every 10 min)
    // RainViewer stores tiles as Unix timestamps rounded to the nearest 10 minutes
    try{
      var ts=Math.floor(Date.now()/600000)*600; // round to 10-min boundary
      _wxLayer=L.tileLayer(
        'https://tilecache.rainviewer.com/v2/radar/'+ts+'/256/{z}/{x}/{y}/2/1_1.png',
        {opacity:0.65,maxZoom:12,attribution:'RainViewer'}
      ).addTo(_wxMap);
      if(upd)upd.textContent='Live radar · '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});

      // Try to get a more precise latest frame in background (optional enhancement)
      fetch('https://api.rainviewer.com/public/weather-maps.json',{cache:'no-store'})
        .then(function(r){return r.json();})
        .then(function(data){
          if(!_wxMap)return; // map may have been destroyed while fetch was in-flight
          var host=data.host||'https://tilecache.rainviewer.com';
          var frames=(data.radar&&data.radar.past)||[];
          if(!frames.length)return;
          var latest=frames[frames.length-1];
          var path=latest.path||(latest.time?'/v2/radar/'+latest.time:'');
          if(!path)return;
          try{if(_wxLayer&&_wxMap)_wxMap.removeLayer(_wxLayer);}catch(e){}
          if(!_wxMap)return; // check again after removeLayer
          _wxLayer=L.tileLayer(host+path+'/256/{z}/{x}/{y}/2/1_1.png',
            {opacity:0.65,maxZoom:12,attribution:'RainViewer'}).addTo(_wxMap);
          var upd2=$('wx-updated');
          if(upd2)upd2.textContent='Live · '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
        })
        .catch(function(){/* silently stay on timestamp-based layer */});
    }catch(e){
      if(upd)upd.innerHTML='Radar tiles unavailable · <button onclick="openWindy()" style="background:none;border:none;color:var(--teal);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;padding:0">Open Windy ↗</button>';
    }
  } else {
    // Satellite: RainViewer infrared — same no-fetch approach
    try{
      var satTs=Math.floor(Date.now()/600000)*600;
      _wxLayer=L.tileLayer(
        'https://tilecache.rainviewer.com/v2/satellite/infrared/'+satTs+'/256/{z}/{x}/{y}/0/1_1.png',
        {opacity:0.5,maxZoom:12,attribution:'RainViewer'}
      ).addTo(_wxMap);
      if(upd)upd.textContent='Satellite · '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});

      // Background update
      fetch('https://api.rainviewer.com/public/weather-maps.json',{cache:'no-store'})
        .then(function(r){return r.json();})
        .then(function(data){
          if(!_wxMap)return;
          var host=data.host||'https://tilecache.rainviewer.com';
          var frames=(data.satellite&&data.satellite.infrared)||[];
          if(!frames.length)return;
          var latest=frames[frames.length-1];
          var path=latest.path||(latest.time?'/v2/satellite/infrared/'+latest.time:'');
          if(!path)return;
          try{if(_wxLayer&&_wxMap)_wxMap.removeLayer(_wxLayer);}catch(e){}
          if(!_wxMap)return;
          _wxLayer=L.tileLayer(host+path+'/256/{z}/{x}/{y}/0/1_1.png',
            {opacity:0.5,maxZoom:12,attribution:'RainViewer'}).addTo(_wxMap);
          var updSat=$('wx-updated');
          if(updSat)updSat.textContent='Satellite · '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
        })
        .catch(function(){});
    }catch(e){
      if(upd)upd.textContent='Satellite unavailable';
    }
  }
}

async function updateNearbyWeather(){
  var icaos=NEARBY.map(function(a){return a.icao;}).join(',');
  try{
    var res=await fetch('https://aviationweather.gov/api/data/metar?ids='+icaos+'&format=json',{cache:'no-store'});
    if(!res.ok)return;
    var data=await res.json();
    data.forEach(function(m){
      var apt=NEARBY.find(function(a){return a.icao===m.icaoId;});
      if(!apt)return;
      var wx=[];
      var raw=m.rawOb||'';
      var vis=raw.match(/\s(\d+)SM/);if(vis)wx.push('Vis '+vis[1]+'SM');
      var wind=raw.match(/(\d{3})(\d{2})KT/);if(wind)wx.push('Wind '+wind[1]+'@'+parseInt(wind[2]));
      var sky=raw.match(/(FEW|SCT|BKN|OVC)(\d{3})/);if(sky)wx.push(sky[1]+' '+(parseInt(sky[2])*100)+'ft');
      if(!wx.length&&raw.indexOf('CAVOK')>=0)wx.push('CAVOK');
      if(!wx.length&&(raw.indexOf('CLR')>=0||raw.indexOf('SKC')>=0))wx.push('Clear');
      if(wx.length)apt.wx=wx.join(', ');
      apt.updated=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    });
    var el=$('nearest-list');
    if(el){
      el.innerHTML=NEARBY.map(function(a){
        return'<div class="aptrow">'
          +'<div class="apticao">'+a.icao+'</div>'
          +'<div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--t1)">'+a.name+'</div>'
          +'<div style="font-size:10px;color:var(--t2);margin-top:1px">'+a.wx+(a.updated?' · <span style="color:var(--green)">Live</span>':'')+'</div></div>'
          +'<div style="text-align:right"><div style="font-size:12px;font-weight:700;color:var(--teal)">'+a.nm+' NM</div><div style="font-size:9px;color:var(--t3)">'+a.brg+'</div></div>'
        +'</div>';
      }).join('');
    }
  }catch(e){/* static data remains */}
}

function initMap(){
  if(S.mapInst){S.mapInst.remove();S.mapInst=null;}
  var el=$('navmap');if(!el)return;
  try{
    var c=APTS[S.pfFrom]||{lat:25.8,lng:-80.3};
    var m=L.map('navmap',{zoomControl:true,attributionControl:false}).setView([c.lat,c.lng],9);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:18,attribution:''}).addTo(m);
    S.mapInst=m;
    Object.keys(APTS).forEach(function(k){
      var a=APTS[k];
      var icon=L.divIcon({html:'<div style="background:#0B1D35;color:#0BA5B0;font-size:8px;font-weight:800;padding:3px 5px;border-radius:4px;white-space:nowrap;font-family:monospace">'+k+'</div>',className:'',iconAnchor:[16,8]});
      L.marker([a.lat,a.lng],{icon}).addTo(m);
    });
    drawRoute();
  }catch(e){}
}

function drawRoute(){
  if(!S.mapInst)return;
  if(S.mapRoute){S.mapRoute.remove();}
  var f=APTS[S.pfFrom],t=APTS[S.pfTo];
  if(f&&t){
    S.mapRoute=L.polyline([[f.lat,f.lng],[t.lat,t.lng]],{color:'#0BA5B0',weight:3,dashArray:'8 5'}).addTo(S.mapInst);
    S.mapInst.fitBounds([[f.lat,f.lng],[t.lat,t.lng]],{padding:[40,40]});
  }
}

async function genRoute(){
  var from=S.pfFrom,to=S.pfTo;
  if(!from||!to||from.length<3||to.length<3){showToast('Enter departure and destination first','error');return;}
  var isIFR=S.flightRules==='ifr';
  S.routeLoading=true;S.aiRoute=null;go('navscreen');

  var ac=S.ac;
  var isJet=ac.engine==='jet';
  var isTurbo=ac.engine==='turboprop';
  var isPiston=ac.engine==='piston'||ac.engine==='twin';
  var vsp=S.vspeeds||{};
  var grossWt=ac.emptyWt+S.wbSt.reduce(function(a,s){return a+s.w;},0)+S.fuel*(ac.fuelUnit==='lbs'?1:6);

  var perfDefaults={
    piston:   {climbIAS:80, cruiseTAS:120,cruiseFPH:9.5,climbFPH:12,descentFPH:5,climbFPM:700, descentFPM:500, cruiseAlt:8000},
    twin:     {climbIAS:110,cruiseTAS:180,cruiseFPH:18, climbFPH:24,descentFPH:8,climbFPM:1000,descentFPM:700, cruiseAlt:10000},
    turboprop:{climbIAS:160,cruiseTAS:270,cruiseFPH:60, climbFPH:90,descentFPH:30,climbFPM:1800,descentFPM:1200,cruiseAlt:23000},
    jet:      {climbIAS:250,cruiseTAS:400,cruiseFPH:150,climbFPH:250,descentFPH:80,climbFPM:2500,descentFPM:1800,cruiseAlt:37000},
    heli:     {climbIAS:70, cruiseTAS:110,cruiseFPH:25, climbFPH:30,descentFPH:12,climbFPM:800, descentFPM:500, cruiseAlt:5000},
    lsa:      {climbIAS:65, cruiseTAS:95, cruiseFPH:5,  climbFPH:7, descentFPH:3, climbFPM:500, descentFPM:400, cruiseAlt:5500},
    experimental:{climbIAS:75,cruiseTAS:110,cruiseFPH:7,climbFPH:9,descentFPH:4,climbFPM:600,descentFPM:450,cruiseAlt:7000}
  };
  var p=Object.assign({},perfDefaults[ac.engine]||perfDefaults.piston);
  // Override with user's custom POH/manual performance data
  var cp=S.acPerf||{};
  if(cp.cruiseTAS>0)p.cruiseTAS=cp.cruiseTAS;
  if(cp.cruiseFPH>0){p.cruiseFPH=cp.cruiseFPH;p.climbFPH=Math.round(cp.cruiseFPH*1.25*10)/10;p.descentFPH=Math.round(cp.cruiseFPH*0.55*10)/10;}
  if(cp.climbIAS>0)p.climbIAS=cp.climbIAS;
  if(cp.climbFPM>0)p.climbFPM=cp.climbFPM;
  if(cp.descentIAS>0)p.descentIAS=cp.descentIAS;
  if(cp.descentFPM>0)p.descentFPM=cp.descentFPM;
  if(cp.serviceAlt>0)p.cruiseAlt=Math.round(cp.serviceAlt*0.75/1000)*1000; // 75% of service ceiling
  var usingCustomPerf=cp.cruiseTAS>0||cp.cruiseFPH>0||cp.climbFPM>0;
  if(S.cruiseMode==='economy'){p.cruiseTAS=Math.round(p.cruiseTAS*0.82);p.cruiseFPH=Math.round(p.cruiseFPH*0.78*10)/10;}
  var fuelUnit=ac.fuelUnit||'gal';

  // Determine cruise altitude
  var targetAlt=S.cruiseFL>0?(S.cruiseFL*100):p.cruiseAlt;
  var flightLevel=S.cruiseFL>0?'FL'+String(S.cruiseFL).padStart(3,'0'):(Math.round(targetAlt/100)*100)+'ft';

  try{
    var sysPrompt, prompt;

    if(isIFR){
      // ── IFR SYSTEM PROMPT ────────────────────────────────────────
      sysPrompt='You are an expert ICAO/FAA IFR flight dispatcher with full knowledge of: '
        +'North American ATC preferred routes (FAA EOBT/Preferred Routes), '
        +'European Eurocontrol CDR/routes, '
        +'South American ICAO airways (Colombia/ICAO SACM region), '
        +'published airways (US: J/Q/T/V; EUR: UL/UN/UM/UP; RNAV: Y/Z/T/Q), '
        +'SIDs and STARs for major airports, '
        +'RVSM airspace (FL290-FL410), '
        +'RNAV routing (Q-routes, T-routes), '
        +'MEA, MOCA, MCA crossing altitudes, '
        +'and ICAO flight plan format (Item 15 FPL route string). '
        +'Return ONLY valid JSON — no markdown, no extra text.';

      prompt='Plan a complete IFR flight from '+from+' to '+to+' for the following aircraft:\n\n'
        +'AIRCRAFT: '+ac.make+' '+ac.model+' ('+ac.engine+' engine)\n'
        +'Registration: '+esc(ac.tail||'N/A')+'\n'
        +'Gross weight: ~'+Math.round(grossWt)+' lbs\n'
        +'Aircraft performance data source: '+(usingCustomPerf?'✓ CUSTOM (from pilot-entered POH data — USE THESE EXACT VALUES)':'Generic defaults for engine type')+'\n'
        +'RVSM equipped: '+(isJet||isTurbo?'YES':'NO')+'\n'
        +'Requested cruise: '+flightLevel+'\n'
        +'Cruise TAS: '+p.cruiseTAS+' kts\n'
        +'Climb IAS: '+p.climbIAS+' kts at '+p.climbFPM+' fpm\n'
        +'Descent rate: '+p.descentFPM+' fpm\n'
        +'Fuel burn: climb '+p.climbFPH+' '+fuelUnit+'/hr, cruise '+p.cruiseFPH+' '+fuelUnit+'/hr, descent '+p.descentFPH+' '+fuelUnit+'/hr\n'
        +'Cruise mode: '+(S.cruiseMode==='performance'?'HIGH PERFORMANCE':'LONG-RANGE ECONOMY')+'\n\n'
        +'ROUTING REQUIREMENTS:\n'
        +'1. Produce a realistic ICAO Item 15 route string using actual published airways, waypoints, and intersections\n'
        +'2. If the route crosses multiple FIRs, identify the major FIR crossing points\n'
        +'3. Recommend a valid SID from '+from+' and STAR into '+to+' (use real published procedures if known, or "VECTORS" for radar vectors)\n'
        +'4. For US domestic routes: apply FAA ATC Preferred Routes if applicable\n'
        +'5. For European routes: use Eurocontrol CDR/preferred routes with correct airways (UL/UN/UM series for upper airspace)\n'
        +'6. For Colombian/South American routes: use ICAO airways (UA/UB series, or direct if no airways available)\n'
        +'7. Ensure MEA clearance for the entire route — if a segment MEA is higher than requested cruise, adjust the altitude\n'
        +'8. Note if RVSM separation applies and whether odd/even FL hemispheric rules apply\n'
        +'9. Calculate all phase times and fuel burns\n'
        +'10. Provide an alternate airport recommendation if destination weather could be a concern\n\n'
        +'Return ONLY this JSON (no markdown):\n'
        +'{"route":"SID WAYPT1 AWY1 WAYPT2 AWY2 WAYPT3 STAR","altitude":"FL180","mea":"FL140","sid":"SIDNAME1A","star":"STARNAME1A","flightRules":"ifr","dist":"XXX nm","climbSpeed":"XXX/XXX kts IAS/TAS","cruiseSpeed":"XXX kts TAS M.XXX","timeClimb":"XXm","timeCruise":"Xh XXm","timeDescent":"XXm","ete":"Xh XXm","fuelClimb":"XX '+fuelUnit+'","fuelCruise":"XX '+fuelUnit+'","fuelDescent":"XX '+fuelUnit+'","fuelTotal":"XX '+fuelUnit+'","alternate":"ICAO","windsAloft":"XXX°@XX kts component +/-XX kts","weather":"Brief wx summary","terrainWarning":null,"notes":"Any important airspace or NOTAMs to note"}';

    } else {
      // ── VFR SYSTEM PROMPT (enhanced) ────────────────────────────
      sysPrompt='You are a professional aviation dispatcher and route planner with expert knowledge of VFR procedures, terrain clearance (FAR 91.119/91.177), visual waypoints, and aircraft performance. Return only valid JSON.';

      prompt='Plan a detailed VFR flight from '+from+' to '+to+'.\n\n'
        +'AIRCRAFT: '+ac.make+' '+ac.model+' ('+ac.engine+')\n'
        +'Gross weight: ~'+Math.round(grossWt)+' lbs | Cruise mode: '+(S.cruiseMode==='performance'?'HIGH PERFORMANCE':'FUEL EFFICIENCY')+'\n'
        +'Cruise TAS: '+p.cruiseTAS+' kts | Climb: '+p.climbIAS+' kts @ '+p.climbFPM+' fpm | Descent: '+p.descentFPM+' fpm\n'
        +'Fuel: climb '+p.climbFPH+', cruise '+p.cruiseFPH+', descent '+p.descentFPH+' '+fuelUnit+'/hr\n\n'
        +'REQUIREMENTS: great-circle distance, terrain-safe VFR altitude, realistic waypoints, phase times, fuel by phase, terrain/airspace warnings.\n\n'
        +'Return ONLY JSON:\n'
        +'{"route":"WAYPT1 WAYPT2 WAYPT3","altitude":"X,XXX ft MSL","mea":"X,XXX ft","flightRules":"vfr","dist":"XXX nm","climbSpeed":"XXX kts IAS","cruiseSpeed":"XXX kts TAS","timeClimb":"XXm","timeCruise":"Xh XXm","timeDescent":"XXm","ete":"Xh XXm","fuelClimb":"XX '+fuelUnit+'","fuelCruise":"XX '+fuelUnit+'","fuelDescent":"XX '+fuelUnit+'","fuelTotal":"XX '+fuelUnit+'","windsAloft":"XXX°@XX kts","weather":"Brief wx","terrainWarning":null}';
    }

    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:isIFR?1200:800,
        system:sysPrompt,
        messages:[{role:'user',content:prompt}]
      })
    });
    var data=await res.json();
    var raw=(data.content&&data.content[0]&&data.content[0].text)||'{}';
    raw=raw.replace(/```json|```/g,'').trim();
    raw=raw.replace(/"terrainWarning"\s*:\s*"null"/g,'"terrainWarning":null');
    S.aiRoute=JSON.parse(raw);
    S.aiRoute.flightRules=isIFR?'ifr':'vfr';
    S.routeLoading=false;
    go('navscreen');
    setTimeout(initRouteMap,300);
  }catch(e){
    // Realistic fallback with proper phase breakdown
    var distNm=145;
    var climbMin=Math.round((p.cruiseAlt/p.climbFPM));
    var climbDistNm=Math.round(climbMin/60*p.climbIAS);
    var descentMin=Math.round((p.cruiseAlt/p.descentFPM));
    var descentDistNm=Math.round(descentMin/60*p.cruiseTAS);
    var cruiseDistNm=Math.max(10,distNm-climbDistNm-descentDistNm);
    var cruiseMin=Math.round(cruiseDistNm/p.cruiseTAS*60);
    var totalMin=climbMin+cruiseMin+descentMin;
    var fuelClimb=Math.round(p.climbFPH*(climbMin/60)*10)/10;
    var fuelCruise=Math.round(p.cruiseFPH*(cruiseMin/60)*10)/10;
    var fuelDescent=Math.round(p.descentFPH*(descentMin/60)*10)/10;
    var fuelTotal=Math.round((fuelClimb+fuelCruise+fuelDescent)*10)/10;
    var h=Math.floor(totalMin/60),m=totalMin%60;
    S.aiRoute={
      route:from+' DCT '+to,dist:distNm+' nm',
      altitude:(Math.round(p.cruiseAlt/500)*500).toLocaleString()+' ft',
      mea:(Math.round(p.cruiseAlt*0.8/500)*500).toLocaleString()+' ft',
      climbSpeed:p.climbIAS+' kts IAS',cruiseSpeed:p.cruiseTAS+' kts TAS',
      timeClimb:climbMin+'m',timeCruise:(Math.floor(cruiseMin/60)>0?Math.floor(cruiseMin/60)+'h ':'')+(cruiseMin%60)+'m',
      timeDescent:descentMin+'m',ete:(h>0?h+'h ':'')+m+'m',
      fuelClimb:fuelClimb+' '+fuelUnit,fuelCruise:fuelCruise+' '+fuelUnit,
      fuelDescent:fuelDescent+' '+fuelUnit,fuelTotal:fuelTotal+' '+fuelUnit,
      windsAloft:'Wind data unavailable — check ForeFlight or 1800wxbrief.com',
      weather:'No weather data. Check METAR/TAF before flight.',
      terrainWarning:null
    };
  }
  S.routeLoading=false;go('navscreen');setTimeout(initRouteMap,300);
}

function toggleSaved(id){

  else{S.mktSaved.push(id);showToast('Saved ❤️','ok');}

function nextMktStep(){
  var step=S.mktSellStep;
  if(step===1){
    var cat=document.getElementById('sc-cat'),title=document.getElementById('sc-title'),desc=document.getElementById('sc-desc');
    if(cat)S.mktDraft.cat=cat.value;
    if(title)S.mktDraft.title=title.value;
    if(desc)S.mktDraft.desc=desc.value;
    if(!S.mktDraft.cat){showToast('Select a category','error');return;}
    if(!S.mktDraft.title||S.mktDraft.title.length<5){showToast('Add a title (min 5 chars)','error');return;}
  }
  if(step===2){
    var priceEl=document.getElementById('sc-price'),paypalEl=document.getElementById('sc-paypal');
    if(priceEl)S.mktDraft.price=priceEl.value;
    if(paypalEl)S.mktDraft.paypal=paypalEl.value;
    if(!S.mktDraft.price||parseFloat(S.mktDraft.price)<=0){showToast('Enter a valid price','error');return;}
    if(!S.mktDraft.paypal||!S.mktDraft.paypal.includes('@')){showToast('Enter your PayPal email','error');return;}

  S.mktSellStep=Math.min((S.mktSellStep||1)+1,3);
  go('market');
}

// ── Marketplace media upload ───────────────────────────────────
function addMktFiles(kind){
  if(!S.mktDraft.media) S.mktDraft.media=[];
  var inp=document.createElement('input');
  inp.type='file';
  inp.multiple=true;
  if(kind==='image') inp.accept='image/*';
  if(kind==='video') inp.accept='video/mp4,video/quicktime,video/webm,video/*';

  inp.onchange=async function(){
    var files=Array.from(this.files||[]);
    if(!files.length) return;

    // Validate size: images 15MB, videos 100MB
    var maxBytes=kind==='video'?100*1024*1024:15*1024*1024;
    var oversized=files.filter(function(f){return f.size>maxBytes;});
    if(oversized.length){
      showToast(oversized.length+' file(s) too large (max '+(kind==='video'?'100':'15')+'MB)','error');
      files=files.filter(function(f){return f.size<=maxBytes;});
      if(!files.length) return;
    }

    // Show progress toast
    showToast('Reading '+files.length+' file(s)...');

    var reads=files.map(function(file){
      return new Promise(function(res){
        var fr=new FileReader();
        fr.onload=function(){
          res({type:kind,data:fr.result,name:file.name,size:file.size});
        };
        fr.onerror=function(){res(null);};
        fr.readAsDataURL(file);
      });
    });

    var results=await Promise.all(reads);
    var added=0;
    results.forEach(function(r){
      if(r&&r.data){S.mktDraft.media.push(r);added++;}
    });
    if(added) showToast(added+' '+(kind==='video'?'video':'photo')+(added>1?'s':'')+' added','ok');
    go('market'); // re-render to show thumbs
  };
  inp.click();
}

function commitMktLink(){
  var urlEl=document.getElementById('link-url');
  var labelEl=document.getElementById('link-label');
  var url=urlEl?urlEl.value.trim():'';
  if(!url||(!url.startsWith('http'))){showToast('Enter a valid URL starting with https://','error');return;}
  var label=labelEl?labelEl.value.trim():'';
  if(!label){
    // Auto-label based on URL
    if(url.includes('youtube.com')||url.includes('youtu.be')) label='YouTube video';
    else if(url.includes('drive.google')) label='Google Drive';
    else if(url.includes('photos.app.goo.gl')) label='Google Photos';
    else label=url.replace(/^https?:\/\//,'').split('/')[0];
  }
  if(!S.mktDraft.media) S.mktDraft.media=[];
  S.mktDraft.media.push({type:'link',url:url,label:label});
  var ov=document.getElementById('link-ov');
  if(ov)ov.remove();
  showToast('Link added: '+label,'ok');
  go('market');
}

function removeMktMedia(idx){
  if(!S.mktDraft.media)return;
  S.mktDraft.media.splice(idx,1);
  go('market');
}

function showVideoPlayer(listingId, mediaIdx){
  var l=typeof listingId==='string'?S.mktListings.find(function(x){return x.id===listingId;}):null;
  var media=l?l.media:S.mktDraft.media;
  if(!media)return;
  var m=media[mediaIdx||0];
  if(!m||m.type!=='video')return;
  var ov=document.createElement('div');
  ov.style.cssText='position:absolute;inset:0;z-index:9999;background:rgba(0,0,0,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer';
  ov.onclick=function(){ov.remove();};
  ov.innerHTML='<video src="'+m.data+'" controls autoplay style="max-width:100%;max-height:80vh;border-radius:8px"></video>'
    +'<div style="color:rgba(255,255,255,.5);font-size:12px;margin-top:10px">Tap anywhere to close</div>';
  document.getElementById('app').appendChild(ov);
}

var CAL_SHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── Date helpers ─────────────────────────────────────────────────
function calFmt(d){
  if(!d)return'';
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function calParse(s){if(!s)return new Date();var p=s.split('-');return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));}
function calAddDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function calMonday(d){var day=d.getDay(),diff=d.getDate()-(day===0?6:day-1);var r=new Date(d);r.setDate(diff);r.setHours(0,0,0,0);return calFmt(r);}
function calWeekNum(dateStr){
  var cal=S.cal;if(!cal.rotationEnabled||!cal.rotationStartDate)return-1;
  var start=calParse(cal.rotationStartDate);
  var target=calParse(dateStr);
  var diff=Math.round((target-start)/86400000);
  return Math.floor(diff/7);
}
function calOwnerForDate(dateStr){
  var wn=calWeekNum(dateStr);if(wn<0)return-1;
  var n=S.coOwners.length||2;
  return((wn%n)+n)%n;
}
function calGetBookings(dateStr){
  if(!S.cal||!S.cal.bookings)return[];
  return S.cal.bookings.filter(function(b){
    return b.status!=='rejected'&&b.startDate<=dateStr&&b.endDate>=dateStr;
  });
}
function calIsBlocked(dateStr){return calGetBookings(dateStr).length>0;}

// ── Month grid ────────────────────────────────────────────────────
function calMonthH(){
  var cal=S.cal;
  var year=cal.viewYear,month=cal.viewMonth;
  var now=new Date(),todayStr=calFmt(now);
  var firstDay=new Date(year,month,1);
  var daysInMonth=new Date(year,month+1,0).getDate();
  var startDow=firstDay.getDay();
  var pending=cal.requests?cal.requests.filter(function(r){return r.status==='pending'&&r.targetOwnerEmail===S.pilot.email;}).length:0;
  var totalPending=(cal.requests||[]).filter(function(r){return r.status==='pending';}).length;

  // Build cells
  var cells=[];
  for(var i=0;i<startDow;i++)cells.push(null);
  for(var d=1;d<=daysInMonth;d++){
    var ds=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    cells.push({d:d,ds:ds,bookings:calGetBookings(ds),rotIdx:calOwnerForDate(ds),isToday:ds===todayStr,isPast:ds<todayStr});
  }
  while(cells.length%7!==0)cells.push(null);

  var grid=cells.map(function(c){

    var rotBg=cal.rotationEnabled&&c.rotIdx>=0?CAL_LIGHT[c.rotIdx%CAL_COLORS.length]:'transparent';

    var dots=c.bookings.map(function(b){return'<div style="height:4px;border-radius:2px;background:'+CAL_COLORS[(b.ownerIdx||0)%CAL_COLORS.length]+';margin-bottom:1px"></div>';}).join('');
    return'<div onclick="S.cal.selectedDate=\''+c.ds+'\';go(\'calendar\')" style="min-height:52px;border-radius:10px;padding:5px;cursor:pointer;position:relative;background:'+(c.isToday?'var(--navy)':rotBg)+';border:'+(c.isToday?'2px solid var(--teal)':rotBorder)+';opacity:'+(c.isPast?.5:1)+'">'
      +'<div style="font-size:13px;font-weight:'+(c.isToday?800:600)+';color:'+(c.isToday?'#fff':'var(--t1)')+'">'+c.d+'</div>'
      +(dots?'<div style="position:absolute;bottom:4px;left:4px;right:4px">'+dots+'</div>':'')

    +'<div style="display:flex;justify-content:space-between;align-items:center">'

      +'<div style="display:flex;gap:5px">'
        +'<button onclick="showCalSyncSheet()" style="background:var(--bg);border:.5px solid var(--bd);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;color:var(--t2);font-family:inherit;display:flex;align-items:center;gap:4px"><span style="font-size:13px">🔗</span> Sync</button>'
        +(totalPending?'<button onclick="S.cal.showRequests=true;go(\'calendar\')" style="background:#FEF3C7;border:1px solid #FDE68A;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;color:#92400E;font-family:inherit">⏳ '+totalPending+'</button>':'')
        +'<button onclick="S.cal.showSetup=true;go(\'calendar\')" style="background:var(--bg);border:.5px solid var(--bd);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;color:var(--t2);font-family:inherit">⚙</button>'
      +'</div>'

    // Month nav
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
      +'<button onclick="var c=S.cal;c.viewMonth--;if(c.viewMonth<0){c.viewMonth=11;c.viewYear--;}go(\'calendar\')" style="background:var(--bg);border:.5px solid var(--bd);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:inherit">‹</button>'

// ── Save booking ──────────────────────────────────────────────────
function calSaveBooking(){
  var dr=S.cal.draft;
  if(!dr.title.trim()){showToast('Add a title for the booking','error');return;}
  if(!dr.startDate||!dr.endDate){showToast('Select start and end dates','error');return;}
  if(dr.startDate>dr.endDate){showToast('End date must be after start date','error');return;}

  // Read the "booked for" selector value
  var bookedForEl = document.getElementById('cal-booked-for');
  var bookedForName = bookedForEl ? bookedForEl.value : (dr.bookedForName||(S.pilot.name||'Pilot'));
  var charterCustomerEl = document.getElementById('cal-charter-customer');
  var charterCustomer = charterCustomerEl ? charterCustomerEl.value.trim() : (dr.charterCustomer||'');

  // Resolve ownerIdx: -1=pilot, 0..n=coOwner index
  var ownerIdx=0; // 0 = pilot (shown first in color legend)
  var allOwners=[{name:S.pilot.name||'Me',idx:0}].concat(
    (S.coOwners||[]).filter(function(o){return o.name;}).map(function(o,i){return{name:o.name,idx:i+1};})
  );
  var matched=allOwners.find(function(o){return o.name===bookedForName;});
  if(matched) ownerIdx=matched.idx;

  // Check conflicts
  var conflict=false;
  var d=new Date(dr.startDate);
  var end=new Date(dr.endDate);
  while(d<=end){
    var ds=calFmt(d);
    var existing=calGetBookings(ds).filter(function(b){return b.type!=='maintenance';});
    if(existing.length){conflict=true;break;}
    d=calAddDays(d,1);
  }
  if(conflict){
    showToast('Conflict: aircraft already booked on some of those days','error');
    return;
  }
  var booking={
    id:'bk-'+Date.now(),
    ownerIdx:ownerIdx,
    ownerName:bookedForName,
    ownerEmail:S.pilot.email||'',
    bookedBy:S.pilot.name||'Pilot', // who made the reservation
    startDate:dr.startDate,
    endDate:dr.endDate,
    title:dr.title.trim(),
    type:dr.type||'flight',
    status:'confirmed',
    notes:dr.notes||'',
    charterCustomer:charterCustomer||null,
    createdAt:calFmt(new Date())
  };
  if(!S.cal.bookings)S.cal.bookings=[];
  S.cal.bookings.push(booking);
  saveState();
  S.cal.showAdd=false;
  S.cal.selectedDate=null;
  calSendBookingEmail(booking,'new');
  sendNotif(S.ac.tail+' booked',''+(bookedForName)+': '+booking.title+' ('+booking.startDate+(booking.endDate!==booking.startDate?' to '+booking.endDate:'')+')');
  showToast('Booking confirmed!','ok');
  go('calendar');
}

// ═══ CALENDAR SYNC — Google, Outlook, ICS ════════════════════════

function calEventDates(b){
  // Returns {start, end} as YYYYMMDD strings for Google/Outlook
  var s=(b.startDate||'').replace(/-/g,'');
  var e=(b.endDate||'').replace(/-/g,'');
  // All-day: end date is exclusive in iCal — add 1 day
  var ed=calParse(b.endDate);ed.setDate(ed.getDate()+1);
  var eEx=[ed.getFullYear(),String(ed.getMonth()+1).padStart(2,'0'),String(ed.getDate()).padStart(2,'0')].join('');
  return{start:s,end:eEx,startFmt:b.startDate,endFmt:b.endDate};
}

function bookingTitle(b){
  return (S.ac.tail||'Aircraft')+': '+(b.title||'Booked')+(b.ownerName?' ('+b.ownerName+')':'');
}

function bookingDesc(b){
  return 'Aircraft: '+(S.ac.tail||'?')+' — '+(S.ac.make||'')+' '+(S.ac.model||'')+
    '\nPilot: '+(b.ownerName||S.pilot.name||'')+
    '\nType: '+(b.type||'flight')+
    (b.notes?'\nNotes: '+b.notes:'')+
    '\n\nManaged by Volanti';
}

function addToGoogleCal(b){
  var dt=calEventDates(b);
  var url='https://calendar.google.com/calendar/render?action=TEMPLATE'
    +'&text='+encodeURIComponent(bookingTitle(b))
    +'&dates='+dt.start+'/'+dt.end
    +'&details='+encodeURIComponent(bookingDesc(b))
    +'&ctz='+encodeURIComponent(Intl.DateTimeFormat().resolvedOptions().timeZone||'America/New_York');
  window.open(url,'_blank');
}

function addToOutlookCal(b){
  var dt=calEventDates(b);

    +'&subject='+encodeURIComponent(bookingTitle(b))
    +'&startdt='+dt.startFmt
    +'&enddt='+dt.endFmt
    +'&body='+encodeURIComponent(bookingDesc(b));
  window.open(url,'_blank');
}

function downloadICS(b){
  // Single event ICS
  var dt=calEventDates(b);
  var uid='amp-'+b.id+'-'+Date.now()+'@airplanemanagerpro';
  var ics=[
    'BEGIN:VCALENDAR','VERSION:2.0','CALSCALE:GREGORIAN',
    'PRODID:-//Volanti//EN','METHOD:PUBLISH',
    'BEGIN:VEVENT',
    'UID:'+uid,
    'SUMMARY:'+bookingTitle(b).replace(/[,;\\]/g,'\\$&'),
    'DTSTART;VALUE=DATE:'+dt.start,
    'DTEND;VALUE=DATE:'+dt.end,
    'DESCRIPTION:'+bookingDesc(b).replace(/\n/g,'\\n').replace(/[,;\\]/g,'\\$&'),
    'STATUS:CONFIRMED',
    'END:VEVENT','END:VCALENDAR'
  ].join('\r\n');
  var blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=(S.ac.tail||'flight')+'-'+(b.startDate||'event')+'.ics';
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},500);
  showToast('ICS file downloaded','ok');
}

function exportAllICS(){
  // Export all upcoming bookings as one ICS file
  var upcoming=(S.cal.bookings||[]).filter(function(b){return b.endDate>=calFmt(new Date());});
  if(!upcoming.length){showToast('No upcoming bookings to export','ok');return;}
  var lines=['BEGIN:VCALENDAR','VERSION:2.0','CALSCALE:GREGORIAN','PRODID:-//Volanti//EN','METHOD:PUBLISH'];
  upcoming.forEach(function(b){
    var dt=calEventDates(b);
    lines.push('BEGIN:VEVENT');
    lines.push('UID:amp-'+b.id+'@airplanemanagerpro');
    lines.push('SUMMARY:'+bookingTitle(b).replace(/[,;\\]/g,'\\$&'));
    lines.push('DTSTART;VALUE=DATE:'+dt.start);
    lines.push('DTEND;VALUE=DATE:'+dt.end);
    lines.push('DESCRIPTION:'+bookingDesc(b).replace(/\n/g,'\\n').replace(/[,;\\]/g,'\\$&'));
    lines.push('STATUS:CONFIRMED');
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  var blob=new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=(S.ac.tail||'aircraft')+'-schedule.ics';
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},500);
  showToast(upcoming.length+' bookings exported as ICS','ok');
}

function calSendBookingEmail(booking,action){
  // Build recipient list: all co-owners with emails, except the booker

function calShowRequest(dateStr){
  // Open add booking form but flag it as a request
  var cal=S.cal;
  cal.draft={startDate:dateStr,endDate:dateStr,title:'',type:'flight',notes:'',isRequest:true};
  cal.showAdd=true;
  go('calendar');
}

function calSendRequest(){
  var dr=S.cal.draft;
  if(!dr.title.trim()){showToast('Add a title for your request','error');return;}
  var rotIdx=calOwnerForDate(dr.startDate);
  var targetOwner=rotIdx>=0&&S.coOwners[rotIdx]?S.coOwners[rotIdx]:{name:'Unknown',email:''};
  var req={
    id:'rq-'+Date.now(),
    requesterName:S.pilot.name||'Pilot',
    requesterEmail:S.pilot.email||'',
    targetOwnerName:targetOwner.name,
    targetOwnerEmail:targetOwner.email,
    targetOwnerIdx:rotIdx,
    startDate:dr.startDate,
    endDate:dr.endDate,
    title:dr.title,
    type:dr.type||'flight',
    notes:dr.notes||'',
    status:'pending',
    createdAt:calFmt(new Date())
  };
  if(!S.cal.requests)S.cal.requests=[];
  S.cal.requests.push(req);
  saveState();
  S.cal.showAdd=false;
  // Email to owner
  calEmailRequest(req,'send');
  showToast('Request sent to '+targetOwner.name,'ok');
  go('calendar');
}

function calEmailRequest(req,action){
  var isApprove=action==='approve',isReject=action==='reject',isSend=action==='send';
  var toEmail,subject,body;
  if(isSend){
    toEmail=req.targetOwnerEmail;
    subject=encodeURIComponent('['+S.ac.tail+'] Booking request from '+req.requesterName);
    body=encodeURIComponent(
      req.requesterName+' is requesting to use the aircraft during your scheduled week.\n\n'
      +'Aircraft: '+S.ac.tail+'\n'
      +'Dates: '+req.startDate+(req.endDate!==req.startDate?' to '+req.endDate:'')+'\n'
      +'Purpose: '+req.title+'\n'
      +(req.notes?'Notes: '+req.notes+'\n':'')+'\n'
      +'To APPROVE, reply to this email with "APPROVE request '+req.id+'"\n'
      +'To REJECT, reply with "REJECT request '+req.id+'"\n\n'
      +'Or open Volanti → Calendar → Requests to respond.'
    );
  } else {
    toEmail=req.requesterEmail;
    subject=encodeURIComponent('['+S.ac.tail+'] Your booking request was '+(isApprove?'APPROVED':'REJECTED'));
    body=encodeURIComponent(
      'Your booking request has been '+(isApprove?'approved! ✓':'rejected. ✗')+'\n\n'
      +'Aircraft: '+S.ac.tail+'\n'
      +'Dates: '+req.startDate+(req.endDate!==req.startDate?' to '+req.endDate:'')+'\n'
      +'Purpose: '+req.title+'\n\n'
      +(isApprove?'The aircraft is now blocked in the calendar for your dates.':'Please contact '+req.targetOwnerName+' for alternative dates.')
    );
  }
  if(toEmail) window.open('mailto:'+toEmail+'?subject='+subject+'&body='+body,'_blank');
}

function calApproveRequest(id){
  var req=(S.cal.requests||[]).find(function(r){return r.id===id;});
  if(!req)return;
  req.status='approved';
  req.respondedAt=calFmt(new Date());
  // Add it as a booking
  var booking={
    id:'bk-'+Date.now(),
    ownerIdx:0,
    ownerName:req.requesterName,
    ownerEmail:req.requesterEmail,
    startDate:req.startDate,
    endDate:req.endDate,
    title:req.title+'  (approved)',
    type:req.type||'flight',
    status:'confirmed',
    notes:req.notes||'',
    createdAt:calFmt(new Date())
  };
  if(!S.cal.bookings)S.cal.bookings=[];
  S.cal.bookings.push(booking);
  saveState();
  // Show iOS-style confirmation popup
  calShowApprovalPopup(req,true);
  calEmailRequest(req,'approve');
  sendNotif('Request approved',''+req.requesterName+'\'s request for '+req.startDate+' has been approved');
  showToast('Request approved and booking added','ok');
  go('calendar');
}

function calRejectRequest(id){
  var req=(S.cal.requests||[]).find(function(r){return r.id===id;});
  if(!req)return;
  req.status='rejected';
  req.respondedAt=calFmt(new Date());
  saveState();
  calShowApprovalPopup(req,false);
  calEmailRequest(req,'reject');
  showToast('Request rejected. Requester notified.','ok');
  go('calendar');
}

async function sendMsg(){
  var inp=$('cin');if(!inp)return;
  var text=inp.value.trim();if(!text||S.isTyping)return;
  inp.value='';inp.style.height='auto';
  S.chatMsgs.push({role:'user',content:text});
  S.isTyping=true;go('ai');setTimeout(scrollChat,60);
  var tail=S.ac.tail||'the aircraft';
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,system:'You are an expert aviation AI inside Volanti. Aircraft: '+esc(tail)+' — '+esc(S.ac.make)+' '+esc(S.ac.model)+' ('+S.ac.engine+'), max gross '+S.ac.maxGross+' lbs, empty '+S.ac.emptyWt+' lbs. Current fuel: '+S.fuel+' '+S.ac.fuelUnit+'. Answer concisely. For regulations cite FAR/AIM and end with "Verify with FAA/official sources." Never authorize a flight.',messages:S.chatMsgs.slice(-20).map(function(m){return {role:m.role,content:m.content};})})});
    var data=await res.json();
    if(!res.ok){
      var errMsg=data&&data.error&&data.error.message?data.error.message:'API error '+res.status;
      if(res.status===401)errMsg='API authentication error — check that the app is running in its proper environment.';
      if(res.status===429)errMsg='Rate limit reached — please wait a moment and try again.';
      if(res.status===529)errMsg='Anthropic is overloaded — try again in a moment.';
      S.chatMsgs.push({role:'assistant',content:'⚠ '+errMsg});
    } else {
      S.chatMsgs.push({role:'assistant',content:(data.content&&data.content[0]&&data.content[0].text)||'Try again in a moment.'});
    }
  }catch(e){
    var msg='Connection issue. ';
    if(e&&e.message){
      if(e.message.indexOf('Failed to fetch')>=0||e.message.indexOf('NetworkError')>=0)
        msg+='Check your internet connection and try again.';
      else if(e.message.indexOf('CORS')>=0||e.message.indexOf('cross-origin')>=0)
        msg+='API calls blocked — open the app from a web server instead of a local file.';
      else
        msg+=e.message;
    }
    S.chatMsgs.push({role:'assistant',content:'⚠ '+msg});}
  S.isTyping=false;go('ai');setTimeout(scrollChat,80);
}

function initSocialMap(){
  if(S.screen!=='social'||S.social.tab!=='map')return;
  var el=document.getElementById('social-map');
  if(!el)return;

  // Get user GPS position first
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(function(pos){
      _myLat=pos.coords.latitude;_myLng=pos.coords.longitude;
      buildSocialMap(el);
    },function(){buildSocialMap(el);},{timeout:3000,maximumAge:60000});
  } else {
    buildSocialMap(el);
  }
}

function buildSocialMap(el){
  if(_socialMap){try{_socialMap.remove();}catch(e){}}_socialMap=null;
  try{
    var map=L.map(el,{zoomControl:false,attributionControl:false}).setView([_myLat,_myLng],11);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:18}).addTo(map);
    L.control.zoom({position:'bottomright'}).addTo(map);
    _socialMap=map;

    // My position marker
    var myDiv=L.divIcon({
      html:'<div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#0BA5B0,#0284C7);border:3px solid #fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(11,165,176,.6);font-size:20px;cursor:pointer">'

function socialSendMsg(id){
  var inp=$('social-cin');
  var text=inp?inp.value.trim():'';
  if(!text)return;
  if(!S.social.chats[id])S.social.chats[id]=[];
  var now=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  S.social.chats[id].push({from:'me',text:text,ts:now});
  saveState();
  // Auto-reply for demo
  var replies=['Roger that! ✈','Copy, see you up there!','Flying today — what\'s your route?','Current position '+_myLat.toFixed(2)+'N. Let\'s coordinate!','Nice! I\'m near '+DEMO_PILOTS[0].tail+'. Watch for traffic.','Sounds good! Clear skies ✓'];
  var reply=replies[Math.floor(Math.random()*replies.length)];
  setTimeout(function(){
    if(!S.social.chats[id])S.social.chats[id]=[];
    S.social.chats[id].push({from:'other',text:reply,ts:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})});
    saveState();go('social');
    setTimeout(function(){var el=$('social-msgs');if(el)el.scrollTop=el.scrollHeight;},60);
  },1200+Math.random()*800);
  go('social');
  setTimeout(function(){var el=$('social-msgs');if(el)el.scrollTop=el.scrollHeight;},60);
}

  var code=Math.random().toString(36).substr(2,5).toUpperCase();

function copyClubCode(code,btn){
  var text='Join my flying club on Volanti! Code: '+code;
  if(navigator.clipboard){
    navigator.clipboard.writeText(code).then(function(){
      showToast('Code '+code+' copied! ✓','ok');
      if(btn){var orig=btn.textContent;btn.textContent='✓ Copied!';btn.style.background='#DCFCE7';btn.style.color='#166534';setTimeout(function(){btn.textContent=orig;btn.style.background='';btn.style.color='';},1800);}
    }).catch(function(){fallbackCopy(code);showToast('Code '+code+' copied!','ok');});
  } else {
    fallbackCopy(code);showToast('Code '+code+' copied!','ok');
  }
}

function shareClubCode(name,code,method){
  var msg='Join my flying club "'+name+'" on Volanti!\nClub code: '+code+'\n\nDownload the app, go to Pilot Network → Clubs → Join with code and enter: '+code;
  if(method==='sms'){
    window.open('sms:?body='+encodeURIComponent(msg),'_blank');
  } else if(method==='email'){
    var subject=encodeURIComponent('Join my flying club on Volanti');
    window.open('mailto:?subject='+subject+'&body='+encodeURIComponent(msg),'_blank');
  }
  showToast('Opening '+method+'...','ok');
}

function shareClubWhatsApp(name,code){
  var msg='✈ Join my flying club "'+name+'" on Volanti!\n\nClub code: *'+code+'*\n\nOpen the app → Pilot Network → Clubs → Join with code → enter *'+code+'*';
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
  showToast('Opening WhatsApp...','ok');
}

function nativeShareClubCode(name,code){
  if(!navigator.share)return;
  navigator.share({
    title:'Join my flying club on Volanti',
    text:'Join "'+name+'"! Club code: '+code+'. Open Volanti → Pilot Network → Clubs → Join with code.',
  }).catch(function(){});
}

function joinClub(btn){
  var code=($('club-code')||{}).value.trim().toUpperCase();
  if(!code){showToast('Enter a club code','error');return;}
  // Check if own club
  var own=S.social.clubs.find(function(c){return c.code===code;});
  if(own){showToast('You\'re already in this club!','ok');btn.closest('div[style*="position"]').remove();return;}
  // Create a joined club for demo
  S.social.clubs.push({id:'club-'+code,name:'Club '+code,code:code,members:[{name:'Club member',emoji:'✈',online:false}],messages:[{from:'Club member',text:'Welcome to the club!',ts:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}],joined:new Date().toLocaleDateString()});
  saveState();
  btn.closest('div[style*="position"]').remove();
  go('social');showToast('Joined club!','ok');
}

function inviteToClub(pilotId){
  var p=DEMO_PILOTS.find(function(x){return x.id===pilotId;})||S.social.friends.find(function(x){return x.id===pilotId;});
  if(!S.social.clubs.length){showToast('Create a flying club first','error');S.social.tab='clubs';go('social');return;}
  if(S.social.clubs.length===1){
    S.social.clubs[0].members.push({id:pilotId,name:p.name,emoji:p.emoji,online:p.online,tail:p.tail});
    saveState();go('social');showToast(p.name+' invited to '+S.social.clubs[0].name,'ok');
  } else {
    showToast('Select which club in the Clubs tab','ok');S.social.tab='clubs';go('social');
  }
}

  var club=S.social.clubs[idx];if(!club)return;
  var inp=$('club-cin');var text=inp?inp.value.trim():'';if(!text)return;

// ═══ EXPENSES BY MONTH WIDGET ════════════════════════════════════
function dashWidget_expenses(){
  var now = new Date();
  var f = _expFilter;
  var MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var allExp = getAllExpenses();

  // 12-month data for selected year
  var monthlyData = Array(12).fill(0);
  var prevMonthlyData = Array(12).fill(0);
  expInRange(allExp, f.year, -1).forEach(function(e){
    monthlyData[new Date(e.date).getMonth()] += e.amount;
  });
  expInRange(allExp, f.year-1, -1).forEach(function(e){
    prevMonthlyData[new Date(e.date).getMonth()] += e.amount;
  });

  var yearTotal = monthlyData.reduce(function(s,v){return s+v;},0);
  var prevYearTotal = prevMonthlyData.reduce(function(s,v){return s+v;},0);
  var thisMonthTotal = monthlyData[now.getMonth()];
  var prevMonthTotal = monthlyData[now.getMonth()>0?now.getMonth()-1:11];
  var diff = thisMonthTotal - prevMonthTotal;
  var diffPct = prevMonthTotal>0?Math.round(Math.abs(diff)/prevMonthTotal*100):null;

  var chartMax = Math.max.apply(null, monthlyData.concat(f.vsLastYear?prevMonthlyData:[]).concat([1]));

  return '<div class="card">'
    // Header
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">'
      +'<div>'
        +'<div class="seclbl" style="margin:0 0 2px">💰 Expenses</div>'
        +'<div style="font-size:22px;font-weight:900;color:var(--t1)">$'+Math.round(yearTotal).toLocaleString()+'</div>'
        +'<div style="font-size:10px;color:var(--t3);margin-top:1px">'+f.year+' YTD</div>'
      +'</div>'
      +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">'
        // Year selector
        +'<div style="display:flex;align-items:center;gap:2px">'
          +'<button onclick="_expFilter.year=_expFilter.year-1;go(\'dash\')" style="background:var(--bg);border:.5px solid var(--bd);border-radius:6px;padding:3px 7px;cursor:pointer;font-family:inherit;font-size:12px;color:var(--t2)">‹</button>'
          +'<span style="font-size:11px;font-weight:700;color:var(--t1);padding:0 5px">'+f.year+'</span>'
          +'<button onclick="_expFilter.year=_expFilter.year+1;go(\'dash\')" style="background:var(--bg);border:.5px solid var(--bd);border-radius:6px;padding:3px 7px;cursor:pointer;font-family:inherit;font-size:12px;color:var(--t2)">›</button>'
        +'</div>'
        // vs last year toggle
        +'<button onclick="_expFilter.vsLastYear=!_expFilter.vsLastYear;go(\'dash\')" '
          +'style="font-size:9px;font-weight:700;padding:3px 8px;border-radius:6px;cursor:pointer;font-family:inherit;background:'+(f.vsLastYear?'rgba(11,165,176,.12)':'var(--bg)')+';border:.5px solid '+(f.vsLastYear?'rgba(11,165,176,.4)':'var(--bd)')+';color:'+(f.vsLastYear?'var(--teal)':'var(--t2)')+'">vs '+(f.year-1)+'</button>'
      +'</div>'
    +'</div>'
    // Month summary chips
    +'<div style="display:flex;gap:6px;margin-bottom:10px">'
      +'<div style="flex:1;background:var(--bg);border-radius:9px;padding:8px 10px;border:.5px solid var(--bd)">'
        +'<div style="font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.4px">'+MONTH_NAMES[now.getMonth()]+'</div>'
        +'<div style="font-size:16px;font-weight:800;color:var(--t1)">$'+Math.round(thisMonthTotal).toLocaleString()+'</div>'
      +'</div>'
      +(diffPct!==null
        ?'<div style="flex:1;background:var(--bg);border-radius:9px;padding:8px 10px;border:.5px solid var(--bd)">'
          +'<div style="font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.4px">vs prev mo.</div>'
          +'<div style="font-size:16px;font-weight:800;color:'+(diff>0?'#ef4444':'#22c55e')+'">'+(diff>0?'↑':'↓')+diffPct+'%</div>'
        +'</div>'
        :''
      )
      +(f.vsLastYear&&prevYearTotal>0
        ?'<div style="flex:1;background:rgba(11,165,176,.06);border-radius:9px;padding:8px 10px;border:.5px solid rgba(11,165,176,.2)">'
          +'<div style="font-size:9px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.4px">'+(f.year-1)+' YTD</div>'
          +'<div style="font-size:16px;font-weight:800;color:var(--horizon)">$'+Math.round(prevYearTotal).toLocaleString()+'</div>'
        +'</div>'
        :''
      )
    +'</div>'
    // Bar chart — 12 months
    +'<div style="display:flex;align-items:flex-end;gap:2px;height:70px;margin-bottom:4px">'
      +monthlyData.map(function(val,mi){
        var prev = f.vsLastYear?prevMonthlyData[mi]:0;
        var pct = chartMax>0?Math.max(val>0?4:0, val/chartMax*100):0;
        var pctPrev = chartMax>0&&prev>0?Math.max(4, prev/chartMax*100):0;

          +'<div style="flex:1;width:100%;display:flex;align-items:flex-end;gap:1px">'
