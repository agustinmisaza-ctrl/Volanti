// Performance base data by engine type
var CRUISE_PERF_BASE={
  piston:   {hp:180,bsfc:0.44,ias:120,fuelFactor:0.55,altFactor:0.018,vneKt:163,maxAlt:12000},
  twin:     {hp:360,bsfc:0.43,ias:170,fuelFactor:0.50,altFactor:0.020,vneKt:220,maxAlt:16000},
  turboprop:{hp:1200,bsfc:0.55,ias:220,fuelFactor:0.35,altFactor:0.022,vneKt:300,maxAlt:30000},
  jet:      {hp:3000,bsfc:0.65,ias:280,fuelFactor:0.25,altFactor:0.025,vneKt:450,maxAlt:41000},
  lsa:      {hp:100,bsfc:0.45,ias:95,fuelFactor:0.60,altFactor:0.016,vneKt:120,maxAlt:10000},
  experimental:{hp:160,bsfc:0.43,ias:110,fuelFactor:0.55,altFactor:0.017,vneKt:150,maxAlt:12000},
  heli:     {hp:450,bsfc:0.50,ias:100,fuelFactor:0.50,altFactor:0.015,vneKt:150,maxAlt:8000},
  ultralight:{hp:65,bsfc:0.46,ias:70,fuelFactor:0.62,altFactor:0.014,vneKt:90,maxAlt:6000},
};

function calcCruisePerf(alt,power,oatDev,mixture){
  var base=CRUISE_PERF_BASE[S.ac.engine]||CRUISE_PERF_BASE.piston;
  var pct=power/100;

  // If pilot has entered custom performance data, use it to calibrate the model
  var cp=S.acPerf||{};
  var hasCustomTAS=cp.cruiseTAS>0;
  var hasCustomFPH=cp.cruiseFPH>0;

  // ISA temperature at altitude
  var isaTemp=15-(alt/1000)*2;
  var oat=isaTemp+oatDev;
  var oatK=oat+273.15;

  // Density altitude calculation
  var stdTempK=288.15-(alt/1000)*6.5;
  var tempRatio=oatK/stdTempK;
  var da=Math.round(alt+(120*(oatDev)));

  // TAS: if custom data available, use as 75%-power baseline and scale from there
  var densityFactor=Math.sqrt(tempRatio*Math.exp(alt/27000));
  var ias=base.ias*pct+base.ias*(1-pct)*0.75;
  var tas;
  if(hasCustomTAS){
    // Use custom TAS at 75% power, scale proportionally for other power settings
    var baseTAS=cp.cruiseTAS*(pct/0.75);
    tas=Math.round(baseTAS*densityFactor);
  } else {
    tas=Math.round(ias*densityFactor);
  }

  // Fuel flow
  var isPiston=S.ac.engine==='piston'||S.ac.engine==='twin'||S.ac.engine==='lsa'||S.ac.engine==='experimental'||S.ac.engine==='ultralight';
  var isJetE=S.ac.engine==='jet'||S.ac.engine==='turboprop';

  var baseFFlow;
  if(hasCustomFPH){
    // Custom fuel burn at 75% power — scale for other power settings
    baseFFlow=cp.cruiseFPH*(pct/0.75);
    if(S.ac.fuelUnit==='lbs'&&isPiston) baseFFlow=baseFFlow*6.7;
  } else {
    baseFFlow=(base.hp*base.bsfc*pct)/6;
    if(S.ac.fuelUnit==='lbs') baseFFlow=baseFFlow*6.7;
  }

  // Altitude effect on fuel flow
  var altEffect=isPiston?Math.max(0.7,1-(alt/1000)*0.018):Math.max(0.6,1+(alt/10000)*0.15);
  var mixtureEffect=mixture==='rich'?1.12:mixture==='lean'?0.88:1.0;
  var ff=Math.round(baseFFlow*altEffect*mixtureEffect*10)/10;

  // Range (with 45-min reserve)
  var usableFuel=S.ac.maxFuel;
  var reserveFuel=ff*0.75;
  var tripFuel=Math.max(0,usableFuel-reserveFuel);
  var range=ff>0?Math.round(tas*(tripFuel/ff)):0;

  // Endurance
  var endurMin=ff>0?Math.round((tripFuel/ff)*60):0;
  var endur=Math.floor(endurMin/60)+'h '+(endurMin%60)+'m';

  return {tas:tas,ff:ff,da:da.toLocaleString(),range:range,endurance:endur,pct:pct,customData:hasCustomTAS||hasCustomFPH};
}

function updateCruise(){
  var cs=S.cruiseState;
  var p=calcCruisePerf(cs.alt,cs.power,cs.oatDev,cs.mixture);
  var el;
  if((el=$('crz-tas')))el.textContent=p.tas;
  if((el=$('crz-ff')))el.textContent=p.ff;
  if((el=$('crz-range')))el.textContent=p.range;
  if((el=$('crz-endur')))el.textContent=p.endurance;
  if((el=$('crz-da')))el.textContent=p.da;
  if((el=$('crz-alt-lbl')))el.textContent=cs.alt.toLocaleString()+' ft';
  if((el=$('crz-pwr-lbl')))el.textContent=cs.power+'%';
  if((el=$('crz-oat-lbl')))el.textContent='ISA'+(cs.oatDev>=0?'+':'')+cs.oatDev+'°C';
  drawCruiseChart();
}

function drawCruiseChart(){
  var cv=$('crz-chart');if(!cv)return;
  var altitudes=[2000,8000,16000,25000,35000];
  var colors=['#3b82f6','#0BA5B0','#22c55e','#f97316','#a855f7'];
  var maxAltForAc={piston:12000,twin:16000,turboprop:28000,jet:41000,experimental:12000,lsa:10000,heli:8000,ultralight:6000};
  var maxAlt=maxAltForAc[S.ac.engine]||12000;
  var validAlts=altitudes.filter(function(a){return a<=maxAlt;});

  if(S.charts['crz-chart']){try{S.charts['crz-chart'].destroy();}catch(e){}delete S.charts['crz-chart'];}

  var datasets=validAlts.map(function(alt,i){
    var points=[];
    for(var pw=45;pw<=100;pw+=5){
      points.push(calcCruisePerf(alt,pw,S.cruiseState.oatDev,S.cruiseState.mixture).tas);
    }
    return {label:alt.toLocaleString()+' ft',data:points,borderColor:colors[i],backgroundColor:'transparent',borderWidth:2,pointRadius:0,tension:.4};
  });

  var labels=[];for(var pw=45;pw<=100;pw+=5)labels.push(pw+'%');

  S.charts['crz-chart']=new Chart(cv,{
    type:'line',
    data:{labels:labels,datasets:datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      animation:{duration:0},
      plugins:{legend:{display:false},tooltip:{callbacks:{title:function(i){return 'Power: '+i[0].label;},label:function(i){return i.dataset.label+': '+i.raw+' kts TAS';}}}},
      scales:{
        x:{grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{size:9},color:'#9CA3AF'},title:{display:true,text:'Power Setting',font:{size:9},color:'#9CA3AF'}},
        y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{size:9},color:'#9CA3AF'},title:{display:true,text:'TAS (kts)',font:{size:9},color:'#9CA3AF'}}
      }
    }
  });

  // Draw vertical line at current power setting
  if(S.cruiseState) {
    var plug={
      id:'powerLine',
      afterDraw:function(chart){
        var pwIdx=Math.round((S.cruiseState.power-45)/5);
        if(pwIdx<0||pwIdx>=labels.length)return;
        var x=chart.scales.x.getPixelForIndex(pwIdx);
        var ctx=chart.ctx;
        ctx.save();
        ctx.strokeStyle='rgba(220,38,38,.5)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
        ctx.beginPath();ctx.moveTo(x,chart.chartArea.top);ctx.lineTo(x,chart.chartArea.bottom);ctx.stroke();
        ctx.restore();
      }
    };
    Chart.register(plug);
    S.charts['crz-chart'].update();
    Chart.unregister(plug);
  }
}

function docsAddWithCat(cat,files){
  if(!S.docs)S.docs=[];
  var pending=files.length;
  var addedNames=[];
  files.forEach(function(file){
    var ft=file.type.indexOf('pdf')>=0?'pdf':file.type.indexOf('image')>=0?'image':file.type.indexOf('text')>=0?'text':'other';
    // Read small files (<2MB) as data URL for download; skip data for large files
    if(file.size<2*1024*1024){
      var fr=new FileReader();
      fr.onload=function(){
        S.docs.push({name:file.name,cat:cat,fileType:ft,size:file.size,data:fr.result,added:new Date().toLocaleDateString()});
        addedNames.push(file.name);
        if(--pending===0){saveState();go('docs');showToast(addedNames.length+' document'+(addedNames.length>1?'s':'')+' added','ok');}
      };
      fr.readAsDataURL(file);
    } else {
      // Large file — store metadata only (no base64 to avoid localStorage quota)
      S.docs.push({name:file.name,cat:cat,fileType:ft,size:file.size,data:null,added:new Date().toLocaleDateString()});
      addedNames.push(file.name);
      if(--pending===0){saveState();go('docs');showToast(addedNames.length+' document'+(addedNames.length>1?'s':'')+' added (large files: metadata only)','ok');}
    }
  });
}

// Merge ALL expense sources into a unified array
function getAllExpenses(){
  var all = [];
  // 1. Direct expenses (manual + imported)
  (S.expenses||[]).forEach(function(e){
    all.push({date:e.date, amount:parseFloat(e.amount)||0, cat:e.cat||'other',
              desc:e.description||e.desc||'', owner:e.owner||'', source:'expense', id:e.id});
  });
  // 2. Flight billing reports — break out items by category, fall back to full total as 'other'
  (S.reports||[]).forEach(function(r){
    if(!r.date) return;
    var items = r.items||[];
    if(items.length){
      items.forEach(function(it,ii){
        var amt = parseFloat(it.qty||1)*(parseFloat(it.unit)||0);
        if(!amt) return;
        var cat = (['fuel','maintenance','insurance','hangar','landing','training','admin'].indexOf((it.cat||'').toLowerCase())>=0)
                  ?(it.cat||'other').toLowerCase():'other';
        all.push({date:r.date, amount:amt, cat:cat, desc:it.desc||cat,
                  owner:r.responsible||'', source:'report', id:'rpt_'+r.id+'_'+ii});
      });
    } else {
      var amt = parseFloat(r.totalUSD||r.totalCOP||r.total||0)||0;
      if(!amt) return;
      all.push({date:r.date, amount:amt, cat:'other', desc:'Flight report'+((r.route)?' — '+r.route:''),
                owner:r.responsible||'', source:'report', id:'rpt_'+r.id});
    }
  });
  return all;
}

function expInRange(all, year, month){
  return all.filter(function(e){
    if(!e.date) return false;
    var d = new Date(e.date);
    if(isNaN(d)) return false;
    if(d.getFullYear()!==year) return false;
    if(month>=0 && d.getMonth()!==month) return false;
    return true;
  });
}

function saveQuickExpense(){
  var amt  = parseFloat(document.getElementById('exp-amount').value)||0;
  var date = document.getElementById('exp-date').value;
  if(!amt||!date){showToast('Enter amount and date','error');return;}
  if(!S.expenses) S.expenses=[];

  var cat   = document.getElementById('exp-cat-val').value||'other';
  var desc  = document.getElementById('exp-desc').value.trim();
  var owner = document.getElementById('exp-owner').value;
  var notes = document.getElementById('exp-notes').value.trim();
  var splitMode = document.getElementById('exp-split-toggle')&&document.getElementById('exp-split-toggle').checked;

  // Flight-specific fields
  var fromEl   = document.getElementById('exp-from');
  var toEl     = document.getElementById('exp-to');
  var hobbsOutEl = document.getElementById('exp-hobbs-out');
  var hobbsInEl  = document.getElementById('exp-hobbs-in');
  var isFlight = !!fromEl;
  var from = fromEl ? fromEl.value.toUpperCase().trim() : '';
  var to   = toEl   ? toEl.value.toUpperCase().trim()   : '';
  var hobbsOut = hobbsOutEl ? parseFloat(hobbsOutEl.value)||0 : 0;
  var hobbsIn  = hobbsInEl  ? parseFloat(hobbsInEl.value)||0  : 0;
  var flightHrs = (hobbsIn > hobbsOut) ? Math.round((hobbsIn - hobbsOut)*10)/10 : 0;

  // Auto-split among owners
  var owners = [{name:S.pilot.name||'You', share:0}].concat(
    (S.coOwners||[]).filter(function(o){return o.name&&o.name.trim();})
  );
  var totalShare = owners.reduce(function(s,o){return s+(parseFloat(o.share)||0);},0);

  if(splitMode && totalShare>0){
    owners.forEach(function(o){
      var share = parseFloat(o.share)||0;
      if(share<=0) return;
      var portion = Math.round(amt*(share/totalShare)*100)/100;
      S.expenses.push({
        id:'exp_'+Date.now()+'_'+o.name.replace(/\s/g,''),
        date:date, amount:portion, cat:cat,
        description:desc+(desc?' ('+Math.round(share)+'% share)':''),
        owner:o.name, notes:notes, source:'manual', splitFrom:amt
      });
    });
  } else {
    S.expenses.push({
      id:'exp_'+Date.now(),
      date:date, amount:amt, cat:cat,
      description:desc, owner:owner, notes:notes, source:'manual'
    });
  }

  // Log flight hours to logbook if Hobbs data provided
  if(isFlight && flightHrs>0){
    if(!S.logbook) S.logbook=[];
    S.logbook.push({
      date:date, from:from||'DEP', to:to||'DEST',
      time:flightHrs, pic:flightHrs,
      ac:S.ac.tail||'',
      hobbsOut:hobbsOut, hobbsIn:hobbsIn,
      notes:desc||notes||'', pilot:owner||S.pilot.name||''
    });
    S.logbook.sort(function(a,b){return b.date>a.date?1:b.date<a.date?-1:0;});
    // Update totalHours and hobbsTotal
    S.totalHours = S.logbook.reduce(function(s,f){return s+(parseFloat(f.time)||0);},0);
    S.totalHours = Math.round(S.totalHours*10)/10;
    if(hobbsIn>S.hobbsTotal) S.hobbsTotal=hobbsIn;
    showToast('✓ Flight logged — '+flightHrs.toFixed(1)+'h added','ok');
  }

  S.expenses.sort(function(a,b){return b.date>a.date?1:b.date<a.date?-1:0;});
  saveState();
  document.getElementById('add-exp-overlay').remove();
  if(!isFlight||!flightHrs) showToast(splitMode?'✓ Expense split among owners':'✓ Expense saved','ok');
  if(S.bilTab==='expenses') go('billing');
}

// ── Full Expenses Tab ──────────────────────────────────────────
function buildExpensesTab(){
  var now = new Date();
  var f = _expFilter;
  var allExp = getAllExpenses();
  var MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Available years (from expenses + 2 back)
  var years = [];
  allExp.forEach(function(e){
    var y = e.date?new Date(e.date).getFullYear():0;
    if(y>2000&&years.indexOf(y)<0) years.push(y);
  });
  [now.getFullYear(), now.getFullYear()-1, now.getFullYear()-2].forEach(function(y){
    if(years.indexOf(y)<0) years.push(y);
  });
  years.sort(function(a,b){return b-a;});

  // Filtered expenses
  var filtered = expInRange(allExp, f.year, f.month);
  if(f.cat!=='all') filtered = filtered.filter(function(e){return e.cat===f.cat;});
  filtered.sort(function(a,b){return b.date>a.date?1:b.date<a.date?-1:0;});

  // Last year same period for comparison
  var prevExp = expInRange(allExp, f.year-1, f.month);
  if(f.cat!=='all') prevExp = prevExp.filter(function(e){return e.cat===f.cat;});

  var total = expTotal(filtered);
  var prevTotal = expTotal(prevExp);
  var diff = total - prevTotal;
  var diffPct = prevTotal>0?Math.round(Math.abs(diff)/prevTotal*100):null;

  // Monthly chart data for selected year
  var monthlyData = Array(12).fill(0);
  var prevMonthlyData = Array(12).fill(0);
  expInRange(allExp, f.year, -1).forEach(function(e){
    var m = new Date(e.date).getMonth();
    if(f.cat==='all'||e.cat===f.cat) monthlyData[m]+=e.amount;
  });
  expInRange(allExp, f.year-1, -1).forEach(function(e){
    var m = new Date(e.date).getMonth();

  var chartMax = Math.max.apply(null, monthlyData.concat(f.vsLastYear?prevMonthlyData:[]).concat([1]));

  // Category totals
  var catTotals = {};

      +'<span style="font-size:13px;font-weight:700;color:var(--t1);padding:0 4px">'+f.year+'</span>'
      +'<button onclick="_expFilter.year=_expFilter.year+1;go(\'billing\')" style="padding:7px 10px;background:none;border:none;cursor:pointer;color:var(--t2);font-family:inherit;font-size:13px">›</button>'

      +'<option value="all"'+(f.cat==='all'?' selected':'')+'>All categories</option>'

      +'<div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">'+(f.month>=0?MONTH_NAMES[f.month]+' '+f.year:f.year+' Total')+'</div>'
      +'<div style="font-size:24px;font-weight:900;color:var(--t1)">$'+Math.round(total).toLocaleString()+'</div>'
      +'<div style="font-size:10px;color:var(--t3);margin-top:2px">'+filtered.length+' expense'+(filtered.length!==1?'s':'')+'</div>'

      ?'<div style="background:var(--card);border-radius:12px;padding:12px 14px;border:.5px solid var(--bd)">'

    +(diffPct!==null&&f.vsLastYear

        +'<div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">vs last year</div>'
        +'<div style="font-size:24px;font-weight:900;color:'+(diff>0?'#ef4444':'#22c55e')+'">'+(diff>0?'↑':'↓')+diffPct+'%</div>'
        +'<div style="font-size:10px;color:var(--t3);margin-top:2px">'+(diff>0?'+':'')+Math.round(diff).toLocaleString()+' USD</div>'
      +'</div>'

    )
  +'</div>';

  // Bar chart — 12 months
  html += '<div class="card" style="margin-bottom:14px">'
    +'<div style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Monthly breakdown — '+(f.vsLastYear?f.year+' vs '+(f.year-1):f.year)+'</div>'
    +'<div style="display:flex;align-items:flex-end;gap:3px;height:80px;margin-bottom:4px">';

  monthlyData.forEach(function(val, mi){

  });

  html += '</div>'

  // Category breakdown
  var catFiltered = EXP_CATS.filter(function(c){return catTotals[c.id]>0;});
  if(catFiltered.length>0){
    html += '<div class="card" style="margin-bottom:14px">'
      +'<div style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">By category</div>';
    catFiltered.sort(function(a,b){return catTotals[b.id]-catTotals[a.id];});
    catFiltered.forEach(function(c){
      var pct = total>0?Math.round(catTotals[c.id]/total*100):0;
      html += '<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:.5px solid var(--bd);cursor:pointer" onclick="_expFilter.cat=_expFilter.cat===\''+c.id+'\'?\'all\':\''+c.id+'\';go(\'billing\')">'
        +'<span style="font-size:16px;flex-shrink:0">'+c.icon+'</span>'
        +'<div style="flex:1">'
          +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">'
            +'<span style="font-size:12px;font-weight:600;color:var(--t1)">'+c.label+'</span>'
            +'<span style="font-size:12px;font-weight:700;color:var(--t1)">$'+Math.round(catTotals[c.id]).toLocaleString()+'</span>'
          +'</div>'
          +'<div style="height:4px;background:var(--bd);border-radius:2px">'
            +'<div style="width:'+pct+'%;height:100%;background:'+c.color+';border-radius:2px"></div>'
          +'</div>'
        +'</div>'
        +'<span style="font-size:11px;color:var(--t3);min-width:28px;text-align:right">'+pct+'%</span>'
      +'</div>';
    });
    html += '</div>';
  }

  // Expense list
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
    +'<div style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px">'+filtered.length+' expense'+(filtered.length!==1?'s':'')+' listed</div>'
  +'</div>';

  if(!filtered.length){
    html += '<div class="card" style="text-align:center;padding:32px 16px;color:var(--t3)">'
      +'<div style="font-size:28px;margin-bottom:10px">📋</div>'
      +'<div style="font-size:13px;font-weight:600;color:var(--t2);margin-bottom:6px">No expenses for this period</div>'
      +'<div style="font-size:12px;margin-bottom:16px">Add expenses manually or import from Excel</div>'
      +'<button onclick="showAddExpenseSheet()" style="padding:10px 20px;background:var(--teal);border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;color:#fff;font-family:inherit">+ Add first expense</button>'
    +'</div>';
  } else {
    filtered.forEach(function(e,i){
      var cat = EXP_CATS.find(function(c){return c.id===e.cat;})||EXP_CATS[EXP_CATS.length-1];
      var canDelete = e.source==='manual'||e.source==='expense';
      html += '<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border-radius:12px;border:.5px solid var(--bd);margin-bottom:6px">'
        +'<div style="width:38px;height:38px;border-radius:10px;background:rgba(11,165,176,.1);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">'+cat.icon+'</div>'
        +'<div style="flex:1;min-width:0">'
          +'<div style="font-size:13px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(e.desc||cat.label)+'</div>'
          +'<div style="font-size:10px;color:var(--t3);margin-top:1px">'+esc(e.date)+(e.owner?' · '+esc(e.owner):'')+'<span style="margin-left:6px;font-size:9px;background:var(--bg);border-radius:4px;padding:1px 5px">'+cat.label+'</span></div>'
        +'</div>'
        +'<div style="text-align:right;flex-shrink:0">'
          +'<div style="font-size:14px;font-weight:800;color:var(--t1)">$'+Math.round(e.amount).toLocaleString()+'</div>'
          +(canDelete?'<button onclick="deleteExpense(\''+esc(e.id)+'\')" style="background:none;border:none;color:var(--t3);font-size:11px;cursor:pointer;font-family:inherit;padding:0;margin-top:1px">Delete</button>':'')
        +'</div>'
      +'</div>';
    });
  }

  html += '</div>'; // padding wrapper
  return html;
}

function deleteExpense(id){
  S.expenses=(S.expenses||[]).filter(function(e){return e.id!==id;});
  saveState();
  go('billing');
  showToast('Expense deleted','ok');
}

// ═══ EXCEL EXPENSE IMPORT ════════════════════════════════════════

// App fields that expenses can be mapped to
var EXPENSE_FIELDS = [
  { id:'date',        label:'Date',        required:true,  hint:'Transaction date' },
  { id:'description', label:'Description', required:true,  hint:'What the expense was for' },
  { id:'amount',      label:'Amount',      required:true,  hint:'Dollar amount' },
  { id:'category',    label:'Category',    required:false, hint:'fuel / maintenance / insurance / hangar / other' },
  { id:'pilot',       label:'Owner',       required:false, hint:'Who paid / which owner' },
  { id:'aircraft',    label:'Aircraft',    required:false, hint:'Tail number' },
  { id:'notes',       label:'Notes',       required:false, hint:'Any extra info' },
  { id:'ignore',      label:'— Ignore —',  required:false, hint:'Skip this column' },
];

// State for the import flow
var _xlsImport = null; // { headers, rows, mapping, fileName }

function importExpensesFromExcel() {
  var inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.xlsx,.xls,.csv';
  inp.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = ev.target.result;
        var workbook;
        if (file.name.endsWith('.csv')) {
          workbook = XLSX.read(data, { type: 'string' });
        } else {
          workbook = XLSX.read(data, { type: 'array' });
        }
        var sheet = workbook.Sheets[workbook.SheetNames[0]];
        var rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
        // Find header row — first row with >2 non-empty cells
        var headerRowIdx = 0;
        for (var i = 0; i < Math.min(10, rows.length); i++) {
          var nonEmpty = rows[i].filter(function(c) { return String(c).trim(); }).length;
          if (nonEmpty >= 2) { headerRowIdx = i; break; }
        }
        var headers = rows[headerRowIdx].map(function(h) { return String(h).trim(); });
        var dataRows = rows.slice(headerRowIdx + 1).filter(function(r) {
          return r.some(function(c) { return String(c).trim(); });
        });
        // Cap preview at 200 rows for AI analysis, store all for import
        _xlsImport = {
          fileName: file.name,
          headers: headers,
          rows: dataRows,
          previewRows: dataRows.slice(0, 5),
          mapping: null
        };
        showToast('📊 Analysing ' + headers.length + ' columns with AI…', 'ok');
        xlsAIMapColumns();
      } catch(err) {
        showToast('Could not read file: ' + err.message, 'error');
      }
    };
    if (file.name.endsWith('.csv')) {
      reader.readAsText(file);
    } else {
      reader.readAsArrayBuffer(file);
    }
  };
  inp.click();
}

async function xlsAIMapColumns() {
  var imp = _xlsImport;
  if (!imp) return;

  // Build a sample for AI: headers + first 5 rows
  var sample = [imp.headers].concat(imp.previewRows).map(function(r) {
    return imp.headers.map(function(_, i) { return String(r[i] || ''); });
  });
  var sampleText = sample.map(function(r) { return r.join(' | '); }).join('\n');
  var fieldList = EXPENSE_FIELDS.filter(function(f) { return f.id !== 'ignore'; })
    .map(function(f) { return f.id + ' (' + f.hint + ')'; }).join(', ');

  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 800,
        messages: [{
          role: 'user',
          content: 'You are mapping spreadsheet columns to expense fields for an aviation app.\n\n'
            + 'Available fields: ' + fieldList + '\n\n'
            + 'Spreadsheet sample (header | col1 | col2 ...):\n' + sampleText + '\n\n'
            + 'Return ONLY a JSON object mapping each column header to the best matching field id. '
            + 'Use "ignore" for columns that don\'t match any field. '
            + 'Example: {"Date":"date","Amount USD":"amount","Description":"description","Ref#":"ignore"}\n'
            + 'Column headers to map: ' + JSON.stringify(imp.headers)
        }]
      })
    });
    var data = await res.json();
    var raw = (data.content && data.content[0] && data.content[0].text) || '{}';
    raw = raw.replace(/```json|```/g, '').trim();
    var aiMapping = JSON.parse(raw);
    // Build mapping array aligned to headers
    imp.mapping = imp.headers.map(function(h) {
      return aiMapping[h] || 'ignore';
    });
  } catch(e) {
    // Fallback: try to auto-guess by keyword
    imp.mapping = imp.headers.map(function(h) {
      var hl = h.toLowerCase();
      if (/date|fecha/.test(hl)) return 'date';
      if (/desc|concepto|detail|narr/.test(hl)) return 'description';
      if (/amount|total|monto|value|amt|cost|price/.test(hl)) return 'amount';
      if (/cat|type|tipo/.test(hl)) return 'category';
      if (/pilot|pilot|crew|person|who/.test(hl)) return 'pilot';
      if (/tail|aircraft|plane|reg/.test(hl)) return 'aircraft';
      if (/note|remark|comment/.test(hl)) return 'notes';
      return 'ignore';
    });
  }

  showXlsImportSheet();
}

function showXlsImportSheet() {
  var imp = _xlsImport;
  if (!imp) return;

  var overlay = document.createElement('div');
  overlay.id = 'xls-import-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9000;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)';

  var sheet = document.createElement('div');
  sheet.style.cssText = 'background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:640px;max-height:90dvh;display:flex;flex-direction:column;overflow:hidden';

  // ── Header
  var mappedCount = imp.mapping.filter(function(m) { return m !== 'ignore'; }).length;
  var hdr = '<div style="padding:16px 20px 12px;border-bottom:.5px solid var(--bd);flex-shrink:0">'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">'
      + '<div style="font-size:16px;font-weight:800;color:var(--t1)">📊 Import expenses</div>'
      + '<button onclick="document.getElementById(\'xls-import-overlay\').remove()" style="background:var(--bg);border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;color:var(--t2)">✕</button>'
    + '</div>'
    + '<div style="font-size:11px;color:var(--t3)">'
      + esc(imp.fileName) + ' · <b style="color:var(--t1)">' + imp.rows.length + ' rows</b> · '
      + '<b style="color:var(--teal)">' + mappedCount + ' columns mapped</b>'
    + '</div>'
  + '</div>';

  // ── Column mapping section
  var mappingH = '<div style="padding:14px 20px 8px;border-bottom:.5px solid var(--bd);flex-shrink:0">'
    + '<div style="font-size:11px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Column mapping — tap to change</div>'
    + '<div style="display:flex;flex-direction:column;gap:6px">';

  imp.headers.forEach(function(header, i) {
    var mapped = imp.mapping[i] || 'ignore';
    var field = EXPENSE_FIELDS.find(function(f) { return f.id === mapped; }) || EXPENSE_FIELDS[EXPENSE_FIELDS.length-1];
    var isIgnored = mapped === 'ignore';
    var sampleVals = imp.previewRows.slice(0,3).map(function(r) { return String(r[i]||'').trim(); }).filter(Boolean).join(', ');

    // Build select options
    var opts = EXPENSE_FIELDS.map(function(f) {
      return '<option value="' + f.id + '"' + (f.id === mapped ? ' selected' : '') + '>' + f.label + '</option>';
    }).join('');

    mappingH += '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:10px;border:.5px solid ' + (isIgnored ? 'var(--bd)' : 'rgba(11,165,176,.3)') + '">'
      + '<div style="flex:1;min-width:0">'
        + '<div style="font-size:12px;font-weight:700;color:' + (isIgnored ? 'var(--t3)' : 'var(--t1)') + ';white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(header) + '</div>'
        + (sampleVals ? '<div style="font-size:10px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px">' + esc(sampleVals) + '</div>' : '')
      + '</div>'
      + '<select data-col="' + i + '" onchange="xlsUpdateMapping(this)" '
        + 'style="border:.5px solid var(--bd);border-radius:8px;padding:5px 8px;font-size:11px;font-weight:700;background:var(--card);color:' + (isIgnored ? 'var(--t3)' : 'var(--teal)') + ';cursor:pointer;font-family:inherit;flex-shrink:0">'
        + opts
      + '</select>'
    + '</div>';
  });
  mappingH += '</div></div>';

  // ── Preview table
  var previewH = '<div style="padding:14px 20px 8px;flex-shrink:0">'
    + '<div style="font-size:11px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Preview — first ' + Math.min(imp.previewRows.length,5) + ' rows</div>'
    + '<div style="overflow-x:auto;border-radius:10px;border:.5px solid var(--bd)">'
    + '<table style="width:100%;border-collapse:collapse;font-size:11px">'
    + '<tr style="background:var(--bg)">';
  // Only show non-ignored columns in preview
  var visibleCols = imp.headers.map(function(h, i) { return { idx: i, header: h, field: imp.mapping[i] }; })
    .filter(function(c) { return c.field !== 'ignore'; });
  if (!visibleCols.length) visibleCols = imp.headers.map(function(h,i){return{idx:i,header:h,field:'ignore'};});

  visibleCols.forEach(function(c) {
    var fieldLabel = (EXPENSE_FIELDS.find(function(f){return f.id===c.field;})||{label:c.field}).label;
    previewH += '<th style="padding:7px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--teal);border-bottom:.5px solid var(--bd);white-space:nowrap">'
      + esc(fieldLabel) + '<div style="color:var(--t3);font-weight:500;margin-top:1px">' + esc(c.header) + '</div></th>';
  });
  previewH += '</tr>';

  imp.previewRows.slice(0,5).forEach(function(row, ri) {

function xlsUpdateMapping(sel) {

function xlsDoImport() {
  var imp = _xlsImport;
  if (!imp) return;

  var dateIdx   = imp.mapping.indexOf('date');
  var descIdx   = imp.mapping.indexOf('description');
  var amountIdx = imp.mapping.indexOf('amount');
  var catIdx    = imp.mapping.indexOf('category');
  var ownerIdx  = imp.mapping.indexOf('pilot');  // mapped as pilot but stored as owner
  var notesIdx  = imp.mapping.indexOf('notes');

  if (amountIdx < 0) { showToast('Map the Amount column first','error'); return; }

  var CATS = ['fuel','maintenance','insurance','hangar','landing','training','admin','other'];
  function guessCategory(val) {
    var v = String(val||'').toLowerCase();
    if (/fuel|avgas|100ll|jet.?a|avgas/.test(v)) return 'fuel';
    if (/maint|annual|repair|inspect|mx|overhaul/.test(v)) return 'maintenance';
    if (/insur/.test(v)) return 'insurance';
    if (/hangar|rent/.test(v)) return 'hangar';
    if (/landing|ramp|fee/.test(v)) return 'landing';
    if (/train|lesson|instruc/.test(v)) return 'training';
    return 'other';
  }
  function parseDate(val) {
    if (!val && val !== 0) return new Date().toISOString().slice(0,10);
    // Excel serial number (number type)
    if (typeof val === 'number') {
      // Excel epoch: Dec 30 1899. Add 1 day offset for Lotus bug
      var d = new Date(Date.UTC(1899,11,30) + val * 86400000);
      if (!isNaN(d.getTime())) return d.toISOString().slice(0,10);
    }
    var s = String(val).trim();
    if (!s) return new Date().toISOString().slice(0,10);
    // Try ISO first (2024-03-15)
    var iso = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
    if (iso) return iso[1]+'-'+iso[2].padStart(2,'0')+'-'+iso[3].padStart(2,'0');
    // MM/DD/YYYY or DD/MM/YYYY
    var slash = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
    if (slash) {
      var y = slash[3].length===2?'20'+slash[3]:slash[3];
      var m = slash[1].padStart(2,'0');
      var d2 = slash[2].padStart(2,'0');
      var dt = new Date(y+'-'+m+'-'+d2);
      if (!isNaN(dt.getTime())) return y+'-'+m+'-'+d2;
    }
    // Native parse fallback
    var fb = new Date(s);
    if (!isNaN(fb.getTime())) return fb.toISOString().slice(0,10);
    return new Date().toISOString().slice(0,10);
  }
  function parseAmount(val) {
    if (val===''||val===null||val===undefined) return 0;
    var n = parseFloat(String(val).replace(/[^0-9.\-]/g,''));
    return isNaN(n)?0:Math.abs(n);
  }

  if (!S.expenses) S.expenses = [];
  var imported = 0, skipped = 0;

  imp.rows.forEach(function(row) {
    var amount = parseAmount(row[amountIdx]);
    var desc   = descIdx  >=0 ? String(row[descIdx]||'').trim() : '';
    var date   = dateIdx  >=0 ? parseDate(row[dateIdx]) : new Date().toISOString().slice(0,10);
    if (!amount && !desc) { skipped++; return; }
    var rawCat = catIdx   >=0 ? String(row[catIdx]||'') : '';
    var cat    = CATS.indexOf(rawCat.toLowerCase())>=0 ? rawCat.toLowerCase() : guessCategory(rawCat||desc);
    var owner  = ownerIdx >=0 ? String(row[ownerIdx]||'').trim() : (S.pilot.name||'');
    var notes  = notesIdx >=0 ? String(row[notesIdx]||'').trim() : '';

    S.expenses.push({
      id:'exp_imp_'+Date.now()+'_'+imported,
      date:date, amount:amount, cat:cat,
      description:desc||cat||'Imported expense',
      owner:owner, notes:notes, source:'import'
    });
    imported++;
  });

  S.expenses.sort(function(a,b){return b.date>a.date?1:b.date<a.date?-1:0;});
  saveState();
  _xlsImport = null;
  var sheet = document.getElementById('xls-import-sheet');
  if(sheet) sheet.remove();
  showToast('✓ Imported '+imported+' expenses'+(skipped?' ('+skipped+' skipped)':''),'ok');
  S.bilTab='expenses'; go('billing');
}

function recalcWB(){
  var stW=S.wbSt.reduce(function(a,s){return a+s.w;},0);
  var fuelWt=S.fuel*(S.ac.fuelUnit==='lbs'?1:6);
  var zfw=S.ac.emptyWt+stW;
  var tow=zfw+fuelWt;
  var stMom=S.wbSt.reduce(function(a,s){return a+s.w*s.arm;},0);
  var mom=S.ac.emptyWt*S.ac.emptyCG+stMom+fuelWt*48;
  var cg=tow>0?mom/tow:S.ac.emptyCG;
  // C2 fix: use aircraft-specific CG limits
  var fwdL=S.ac.cgFwdLimit, aftL=S.ac.cgAftLimit;
  var limSet=!!(fwdL&&aftL);
  var ok=limSet?(tow<=S.ac.maxGross&&cg>=fwdL&&cg<=aftL):null;
  var e;
  if((e=$('wbcg')))e.textContent=cg.toFixed(1)+' in';
  if((e=$('wbtow')))e.textContent=Math.round(tow).toLocaleString()+' lbs';
  if((e=$('wbstat'))){e.className='wbstat '+(ok===null?'':(ok?'wbok':'wbbd'));}
  if((e=$('wbbdg'))){
    e.className='bdg '+(ok===null?'bgy':(ok?'bg':'br'));
    e.textContent=ok===null?'Set CG limits in profile':(ok?'Within limits':'Out of limits ⚠');
  }
  drawWB(cg,tow,zfw);
  saveState();
}
function drawWB(cg,tow,zfw){
  var cv=$('wbcv');if(!cv)return;
  var ctx=cv.getContext('2d'),W=cv.width,H=cv.height,p=28;
  // C2 fix: use aircraft CG limits for envelope, fall back to generic if not set
  var envFwd=S.ac.cgFwdLimit||35, envAft=S.ac.cgAftLimit||47.3;
  var cgMin=Math.max(envFwd-5,25),cgMax=Math.min(envAft+8,60);
  var gwMin=1200,gwMax=S.ac.maxGross*1.1;
  var tx=function(v){return p+(v-cgMin)/(cgMax-cgMin)*(W-p*2);};
  var ty=function(v){return H-p-(v-gwMin)/(gwMax-gwMin)*(H-p*2);};
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='#f0f0f0';ctx.lineWidth=.5;
  // grid lines based on aircraft-specific range
  for(var cv2=Math.ceil(envFwd);cv2<=envAft;cv2+=Math.round((envAft-envFwd)/4)){
    ctx.beginPath();ctx.moveTo(tx(cv2),p-4);ctx.lineTo(tx(cv2),H-p+4);ctx.stroke();
  }
  [1500,2000,2500,3000].filter(function(v){return v<=gwMax;}).forEach(function(v){ctx.beginPath();ctx.moveTo(p-4,ty(v));ctx.lineTo(W-p+4,ty(v));ctx.stroke();});
  // Envelope using actual aircraft limits
  ctx.beginPath();ctx.moveTo(tx(envFwd),ty(gwMin));ctx.lineTo(tx(envFwd),ty(S.ac.maxGross));ctx.lineTo(tx(envAft),ty(S.ac.maxGross));ctx.lineTo(tx(envAft),ty(gwMin));ctx.closePath();
  ctx.fillStyle='rgba(11,165,176,.08)';ctx.fill();ctx.strokeStyle='#0BA5B0';ctx.lineWidth=1.5;ctx.stroke();
  // MTOW line
  ctx.setLineDash([4,3]);ctx.strokeStyle='#DC2626';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(p,ty(S.ac.maxGross));ctx.lineTo(W-p,ty(S.ac.maxGross));ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#9CA3AF';ctx.font='10px -apple-system,sans-serif';ctx.textAlign='center';
  [envFwd, Math.round((envFwd+envAft)/2), envAft].forEach(function(v){ctx.fillText(v.toFixed(0),tx(v),H-6);});
  ctx.textAlign='right';
  [1500,2000,2500,3000].filter(function(v){return v<=gwMax;}).forEach(function(v){ctx.fillText((v/1000).toFixed(1)+'K',p-4,ty(v)+4);});
  if(cg&&tow){
    var fwdL=S.ac.cgFwdLimit||35, aftL=S.ac.cgAftLimit||47.3;
    var ok=tow<=S.ac.maxGross&&cg>=fwdL&&cg<=aftL;
    var cgZ=zfw>0?((S.ac.emptyWt*S.ac.emptyCG+S.wbSt.reduce(function(a,s){return a+s.w*s.arm;},0))/zfw):S.ac.emptyCG;
    if(cgZ&&zfw){
      ctx.beginPath();ctx.moveTo(tx(cgZ),ty(zfw));ctx.lineTo(tx(cg),ty(tow));ctx.strokeStyle='#0BA5B0';ctx.lineWidth=2;ctx.stroke();
      ctx.beginPath();ctx.arc(tx(cgZ),ty(zfw),6,0,Math.PI*2);ctx.fillStyle='#F97316';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
      ctx.fillStyle='#F97316';ctx.font='9px -apple-system,sans-serif';ctx.textAlign='left';ctx.fillText('ZFW',tx(cgZ)+8,ty(zfw)+3);
    }
    ctx.beginPath();ctx.arc(tx(cg),ty(tow),7,0,Math.PI*2);ctx.fillStyle=ok?'#059669':'#DC2626';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=ok?'#059669':'#DC2626';ctx.font='9px -apple-system,sans-serif';ctx.textAlign='left';ctx.fillText('TOW',tx(cg)+9,ty(tow)+3);
  }
}

// M4: Real airport FETCH using aviationweather.gov
async function fetchAirportData(){
  var icao=S.perfData.icao;if(!icao||icao.length<3){showToast('Enter an ICAO code first','error');return;}
  showToast('Fetching '+icao+' data...');
  try{
    var res=await fetch('https://aviationweather.gov/api/data/metar?ids='+icao+'&format=json');
    var data=await res.json();
    if(data&&data.length){
      var m=data[0];
      if(m.temp!==undefined)S.perfData.oat=Math.round(m.temp);
      if(m.elev!==undefined)S.perfData.elev=Math.round(m.elev*3.28084);
      if(m.wdir!==undefined)S.perfData.windDir=m.wdir;
      if(m.wspd!==undefined)S.perfData.windSpd=m.wspd;
      showToast('✓ '+icao+' data loaded','ok');
      go('perf');
    } else {showToast('No data for '+icao,'error');}
  }catch(e){showToast('Weather unavailable — check connection','error');}
}

async function calcPerf(type){
  var el=$('presres');if(!el)return;
  el.innerHTML='<div style="text-align:center;padding:24px"><div class="typing" style="display:inline-flex"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><div style="font-size:11px;color:var(--t2);margin-top:10px">AI calculating from AFM data...</div></div>';
  var pd=S.perfData;
  var hw=Math.round(pd.windSpd*Math.cos((pd.rwyHdg-pd.windDir)*Math.PI/180));
  var wt=Math.round(S.ac.emptyWt+S.wbSt.reduce(function(a,s){return a+s.w;},0)+S.fuel*(S.ac.fuelUnit==='lbs'?1:6));
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:250,system:'Aviation performance calculator for a '+S.ac.make+' '+S.ac.model+' ('+S.ac.engine+'). Respond ONLY with raw JSON (no markdown). Schema: {gr:number,d50:number,note:string|null}. gr = ground roll ft, d50 = distance over 50ft obstacle ft.',messages:[{role:'user',content:type+' performance: OAT '+pd.oat+'°C, PA '+pd.elev+'ft, Rwy '+pd.rwyLen+'ft, HW '+Math.abs(hw)+'kts, Weight '+wt+'lbs, Rwy '+pd.rwyC+'. Return JSON.'}]})});
    var data=await res.json();
    var raw=(data.content&&data.content[0]&&data.content[0].text)||'{}';
    raw=raw.replace(/```json|```/g,'').trim();
    var r=JSON.parse(raw);
    S.perfResult={type:type,gr:Math.round(r.gr||1200).toLocaleString(),d50:Math.round(r.d50||2100).toLocaleString(),note:r.note};
  }catch(e){
    S.perfResult={type:type,gr:'1,200',d50:'2,100',note:'Estimated from standard data. Verify with your official '+S.ac.make+' POH before flight.'};
  }
  go('perf');
}

function uploadAcPhoto(){
  var inp=document.createElement('input');
  inp.type='file';
  inp.accept='image/jpeg,image/png,image/webp,image/heic';
  inp.onchange=function(){
    var file=this.files&&this.files[0];
    if(!file)return;
    // Max 3MB for base64 storage
    if(file.size>3*1024*1024){
      showToast('Photo too large — please use a photo under 3MB','error');
      return;
    }
    var fr=new FileReader();
    fr.onload=function(){
      S.ac.photo=fr.result; // base64 data URL
      saveState();
      go('profile');
      showToast('Aircraft photo updated ✓','ok');
    };
    fr.onerror=function(){showToast('Could not read image','error');};
    fr.readAsDataURL(file);
  };
  inp.click();
}

function importLogbook(){
  var inp=document.createElement('input');
  inp.type='file';
  inp.accept='.csv,.txt,.log';
  inp.onchange=function(e){
    var file=e.target.files[0];
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{ parseLogbookCSVText(ev.target.result, file.name); }
      catch(err){ showToast('Could not read file: '+err.message,'error'); }
    };
    reader.readAsText(file);
  };
  inp.click();
}

function parseLogbookCSVText(text, fileName){
  // ── Step 1: Detect ForeFlight multi-section format ────────────────
  var isForeFlight = text.indexOf('ForeFlight Logbook Import') >= 0;
  var rawLines = text.split(/\r?\n/);
  var headers = [];
  var dataRows = [];

  if(isForeFlight){
    // Find "Flights Table" section marker
    var flightsStart = -1;
    for(var i=0;i<rawLines.length;i++){
      if(rawLines[i].replace(/[\s,]/g,'').toLowerCase().indexOf('flightstable')>=0){
        flightsStart = i;
        break;
      }
    }
    if(flightsStart < 0){
      showToast('Could not find Flights Table in ForeFlight export','error');
      return;
    }
    // Next non-empty line after the section header is the column headers
    var headerLine = '';
    for(var j=flightsStart+1; j<rawLines.length; j++){
      var trimmed = rawLines[j].replace(/,/g,'').trim();
      if(trimmed.length > 0){
        headerLine = rawLines[j];
        flightsStart = j;
        break;
      }
    }
    headers = csvSplitLine(headerLine);
    // Data rows: everything after header until empty section
    for(var k=flightsStart+1; k<rawLines.length; k++){
      var row = csvSplitLine(rawLines[k]);
      if(row.every(function(c){return !c.trim();})) continue; // skip blank
      if(row.length >= headers.length - 5) dataRows.push(row);
    }
  } else {
    // Generic CSV: first non-empty row is headers
    var startRow = 0;
    for(var i=0;i<rawLines.length;i++){
      if(rawLines[i].replace(/,/g,'').trim()){startRow=i;break;}
    }
    headers = csvSplitLine(rawLines[startRow]);
    for(var k=startRow+1; k<rawLines.length; k++){
      var row = csvSplitLine(rawLines[k]);
      if(row.every(function(c){return !c.trim();})) continue;
      if(row.length >= 2) dataRows.push(row);
    }
  }

  if(!headers.length || !dataRows.length){
    showToast('No flight data found in file','error');
    return;
  }

  _xlsLogbook = {
    fileName: fileName,
    headers: headers,
    rows: dataRows,
    previewRows: dataRows.slice(0,5),
    mapping: null,
    isForeFlight: isForeFlight
  };

  showToast('✦ AI is mapping '+ headers.length +' columns…','ok');
  logbookAIMapColumns();
}

function csvSplitLine(line){
  // Handles quoted fields with commas inside
  var result=[], cur='', inQ=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur.trim());cur='';}
    else cur+=c;
  }
  result.push(cur.trim());
  return result;
}

async function logbookAIMapColumns(){
  var imp = _xlsLogbook;
  if(!imp) return;

  var sample = [imp.headers].concat(imp.previewRows.slice(0,3)).map(function(r){
    return imp.headers.map(function(_,i){return String(r[i]||'').slice(0,30);});
  });
  var sampleText = sample.map(function(r){return r.join(' | ');}).join('\n');
  var fieldList = LOGBOOK_FIELDS.filter(function(f){return f.id!=='ignore';})
    .map(function(f){return f.id+' ('+f.hint+')';}).join(', ');

  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:800,
        messages:[{role:'user',content:
          'Map these logbook CSV column headers to aviation logbook fields.\n\n'
          +'Available fields: '+fieldList+'\n\n'
          +'Sample data (header row first):\n'+sampleText+'\n\n'
          +'ForeFlight format: '+(imp.isForeFlight?'YES':'NO')+'\n\n'
          +'Return ONLY a JSON object mapping each column header to the best field id. '
          +'Use "ignore" for columns that do not match. '
          +'Example: {"Date":"date","AircraftID":"aircraft","TotalTime":"time","Night":"night"}\n'
          +'Columns to map: '+JSON.stringify(imp.headers)
        }]
      })
    });
    var data=await res.json();
    var raw=(data.content&&data.content[0]&&data.content[0].text)||'{}';
    raw=raw.replace(/```json|```/g,'').trim();
    var aiMap=JSON.parse(raw);
    imp.mapping=imp.headers.map(function(h){return aiMap[h]||'ignore';});
  }catch(e){
    // Keyword fallback
    imp.mapping=imp.headers.map(function(h){
      var hl=h.toLowerCase().replace(/[\s_\-]/g,'');
      if(/^date/.test(hl)) return 'date';
      if(/aircraft|aircraftid|tail|registration|reg/.test(hl)) return 'aircraft';
      if(/^from|departure/.test(hl)) return 'from';
      if(/^to$|^to[^t]|arrival|dest/.test(hl)) return 'to';
      if(/totaltime|total$/.test(hl)) return 'time';
      if(/^pic$/.test(hl)) return 'pic';
      if(/^sic$/.test(hl)) return 'sic';
      if(/^night$/.test(hl)) return 'night';
      if(/crosscountry|cross$/.test(hl)) return 'xc';
      if(/^solo$/.test(hl)) return 'solo';
      if(/actualinstrument|actualifr/.test(hl)) return 'instrument';
      if(/simulatedinstrument|siminstr/.test(hl)) return 'simInstr';
      if(/dualgiven/.test(hl)) return 'dualGiven';
      if(/dualreceived/.test(hl)) return 'dualRcvd';
      if(/alll|alllandingsf/.test(hl)) return 'landings';
      if(/daylandingsfull|daylands/.test(hl)) return 'dayLdg';
      if(/nightlandingsfull|nightlands/.test(hl)) return 'nightLdg';
      if(/pilotcomments|remarks|notes|comments/.test(hl)) return 'remarks';
      return 'ignore';
    });
  }

  showLogbookImportSheet();
}

function logbookUpdateMapping(sel){
  var i=parseInt(sel.dataset.lbcol);
  _xlsLogbook.mapping[i]=sel.value;
  sel.style.color=sel.value==='ignore'?'var(--t3)':'var(--teal)';
  // Refresh sheet
  var ol=document.getElementById('logbook-import-overlay');
  if(ol){ol.remove();showLogbookImportSheet();}
}

function logbookDoImport(){
  var imp=_xlsLogbook;
  if(!imp)return;

  function colIdx(fieldId){ return imp.mapping.indexOf(fieldId); }
  function getVal(row,fieldId){ var i=colIdx(fieldId); return i>=0?String(row[i]||'').trim():''; }
  function getNum(row,fieldId){ return parseFloat(getVal(row,fieldId))||0; }
  function getDate(row){
    var v=getVal(row,'date'); if(!v)return'';
    var d=new Date(v); if(!isNaN(d))return d.toISOString().slice(0,10);
    return v;
  }

  if(colIdx('date')<0||colIdx('time')<0){
    showToast('Please map Date and Total Time columns first','error'); return;
  }

  var flights=[], total=0, skipped=0;
  imp.rows.forEach(function(row){
    var t=getNum(row,'time'), d=getDate(row);
    if(!d&&!t){skipped++;return;}
    var entry={
      date:d, ac:getVal(row,'aircraft')||S.ac.tail||'',
      from:getVal(row,'from'), to:getVal(row,'to'),
      time:t, pic:getNum(row,'pic')||t, sic:getNum(row,'sic'),
      night:getNum(row,'night'), xc:getNum(row,'xc'),
      solo:getNum(row,'solo'), instrument:getNum(row,'instrument'),
      landings:getNum(row,'landings')||getNum(row,'dayLdg')+getNum(row,'nightLdg')||0,
      remarks:getVal(row,'remarks'),
      // Owner fields — default to logged-in pilot, type default owner
      owner: S.pilot.name||'',
      flightType: 'owner'  // 'owner' or 'charter'
    };
    total+=t; flights.push(entry);
  });

  if(!flights.length){ showToast('No valid flight entries found','error'); return; }
  flights.sort(function(a,b){return a.date>b.date?1:a.date<b.date?-1:0;});

  document.getElementById('logbook-import-overlay').remove();
  _xlsLogbook=null;

  // Store pending flights and show assignment screen
  S._pendingFlights = flights;
  S._pendingFlightsTotal = Math.round(total*10)/10;
  showFlightOwnerAssignment(flights, skipped);
}

function showFlightOwnerAssignment(flights, skipped){
  var allOwners = [{name:S.pilot.name||'Me'}].concat(
    (S.coOwners||[]).filter(function(o){return o.name&&o.name.trim();})
  );
  var hasCoOwners = allOwners.length > 1;
  var hasCharter  = S.ac.charterEnabled;

  // If solo pilot and no charter — skip straight to saving
  if(!hasCoOwners && !hasCharter){
    commitFlightImport(flights, skipped);
    return;
  }

  var ov=document.createElement('div');
  ov.id='flight-assign-overlay';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9001;display:flex;flex-direction:column;backdrop-filter:blur(4px)';

  var ownerButtons = allOwners.map(function(o){
    return '<button onclick="flightAssignSetAll(\'owner\',\''+esc(o.name)+'\')" style="flex:1;padding:8px 6px;background:var(--bg);border:.5px solid var(--bd);border-radius:8px;font-size:11px;font-weight:700;color:var(--t1);cursor:pointer;font-family:inherit">'+esc(o.name.split(' ')[0])+'</button>';
  }).join('');
  var charterBtn = hasCharter ? '<button onclick="flightAssignSetAll(\'charter\',\'\')" style="flex:1;padding:8px 6px;background:rgba(220,38,38,.08);border:.5px solid rgba(220,38,38,.2);border-radius:8px;font-size:11px;font-weight:700;color:#ef4444;cursor:pointer;font-family:inherit">Charter</button>':'';

  // Build flight rows (show all, grouped by recency)
  var rows = flights.slice().reverse().slice(0,100).map(function(f,i){
    var realIdx = flights.length-1-i;
    var ownerOpts = allOwners.map(function(o){
      return '<option value="owner:'+esc(o.name)+'" '+(f.owner===o.name&&f.flightType==='owner'?'selected':'')+'>✈ '+esc(o.name)+'</option>';
    }).join('');
    var charterOpt = hasCharter ? '<option value="charter:" '+(f.flightType==='charter'?'selected':'')+'>💼 Charter</option>' : '';
    return'<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:.5px solid var(--bd)">'
      +'<div style="flex:1;min-width:0">'
        +'<div style="font-size:12px;font-weight:700;color:var(--t1)">'+(f.from&&f.to?esc(f.from)+' → '+esc(f.to):esc(f.date)||'Unknown')+'</div>'
        +'<div style="font-size:10px;color:var(--t3)">'+esc(f.date)+' · '+f.time.toFixed(1)+'h</div>'
      +'</div>'
      +'<select onchange="S._pendingFlights['+realIdx+'].flightType=this.value.split(\':\')[0];S._pendingFlights['+realIdx+'].owner=this.value.split(\':\')[1]" style="padding:5px 8px;border-radius:8px;border:.5px solid var(--bd);background:var(--bg);font-size:11px;font-weight:600;color:var(--t1);cursor:pointer;font-family:inherit">'
        +ownerOpts+charterOpt
      +'</select>'
    +'</div>';
  }).join('');

  ov.innerHTML='<div style="background:var(--card);border-radius:20px 20px 0 0;width:100%;margin-top:auto;max-height:90vh;display:flex;flex-direction:column">'
    +'<div style="padding:16px 18px 12px;border-bottom:.5px solid var(--bd);flex-shrink:0">'
      +'<div style="font-size:16px;font-weight:800;color:var(--t1);margin-bottom:4px">Who flew each flight?</div>'
      +'<div style="font-size:11px;color:var(--t3)">'+flights.length+' flights imported'+(skipped?' · '+skipped+' skipped':'')+' · tap a name to assign all, or change individually</div>'
    +'</div>'
    +'<div style="padding:10px 18px;border-bottom:.5px solid var(--bd);flex-shrink:0">'
      +'<div style="font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Assign all flights to:</div>'
      +'<div style="display:flex;gap:6px">'+ownerButtons+charterBtn+'</div>'
    +'</div>'
    +'<div style="flex:1;overflow-y:auto;padding:0 18px">'
      +rows
      +(flights.length>100?'<div style="padding:10px 0;font-size:11px;color:var(--t3);text-align:center">…and '+(flights.length-100)+' more (all assigned to default owner)</div>':'')
    +'</div>'
    +'<div style="padding:12px 18px 24px;flex-shrink:0;display:flex;gap:8px">'
      +'<button onclick="document.getElementById(\'flight-assign-overlay\').remove();S._pendingFlights=null;" style="flex:1;padding:12px;background:var(--bg);border:.5px solid var(--bd);border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;color:var(--t2);font-family:inherit">Cancel</button>'
      +'<button onclick="commitFlightImport(S._pendingFlights,0)" style="flex:2;padding:12px;background:var(--teal);border:none;border-radius:12px;font-size:13px;font-weight:800;cursor:pointer;color:#fff;font-family:inherit">✓ Save '+(flights.length)+' flights</button>'
    +'</div>'
  +'</div>';
  document.body.appendChild(ov);
}

function flightAssignSetAll(type, ownerName){
  if(!S._pendingFlights)return;
  S._pendingFlights.forEach(function(f){ f.flightType=type; f.owner=ownerName; });
  // Re-render selects
  var selects=document.querySelectorAll('#flight-assign-overlay select');
  selects.forEach(function(sel,i){
    var val=type+':'+ownerName;
    for(var j=0;j<sel.options.length;j++){
      if(sel.options[j].value===val){sel.selectedIndex=j;break;}
    }
  });
  showToast('All flights assigned to '+(type==='charter'?'Charter':ownerName),'ok');
}

function commitFlightImport(flights, skipped){
  var total=0, pic=0, night=0, xc=0;
  flights.forEach(function(f){ total+=f.time||0; pic+=f.pic||0; night+=f.night||0; xc+=f.xc||0; });

  S.logbook=flights.slice(-2000);
  S.totalHours=Math.round(total*10)/10;
  S.picHours=Math.round(pic*10)/10;
  S.nightHours=Math.round(night*10)/10;
  S.xCountryHours=Math.round(xc*10)/10;
  var maxHobbsIn=0;
  S.logbook.forEach(function(f){if((f.hobbsIn||0)>maxHobbsIn)maxHobbsIn=f.hobbsIn;});
  S.hobbsTotal=Math.round((maxHobbsIn>0?maxHobbsIn:S.totalHours)*10)/10;
  S._pendingFlights=null;
  saveState();

  var ov=document.getElementById('flight-assign-overlay');
  if(ov)ov.remove();

  var msg='✓ '+flights.length+' flights imported — '+S.totalHours+' hrs total';
  if(skipped)msg+=' ('+skipped+' skipped)';
  showToast(msg,'ok');
  nav('logs');
}

// GPS-based nearby maintenance facility search
var _mxFacilitiesCache=null;
var _mxFacilitiesPos=null;

function renderMxFacilities(){
  if(_mxFacilitiesCache){
    return _mxFacilitiesCache;
  }
  // Trigger GPS search
  setTimeout(function(){loadMxFacilitiesGPS();},100);
  return'<div style="text-align:center;padding:24px;color:var(--t3)">'
    +'<div style="font-size:24px;margin-bottom:8px">📍</div>'
    +'<div style="font-size:13px;font-weight:600;color:var(--t1);margin-bottom:4px">Finding nearby facilities</div>'
    +'<div style="font-size:11px;color:var(--t3)">Requesting your location...</div>'
  +'</div>';
}

function loadMxFacilitiesGPS(){
  var el=$('mx-facilities');
  if(!el)return;

  if(!navigator.geolocation){
    el.innerHTML=renderMxFacilitiesFallback(null,null);
    return;
  }

  el.innerHTML='<div style="text-align:center;padding:20px;color:var(--t3);font-size:12px">'
    +'<div style="font-size:20px;margin-bottom:6px;animation:pulse 1s infinite">📡</div>Getting your location...</div>';

  navigator.geolocation.getCurrentPosition(
    function(pos){
      var lat=pos.coords.latitude;
      var lng=pos.coords.longitude;
      _mxFacilitiesPos={lat:lat,lng:lng};
      el.innerHTML='<div style="text-align:center;padding:16px;color:var(--t3);font-size:11px">Searching for AMOs near you...</div>';
      fetchMxFacilitiesNear(lat,lng,el);
    },
    function(err){
      // Permission denied or error — show search box
      el.innerHTML=renderMxLocationPrompt();
    },
    {timeout:8000,maximumAge:300000}
  );
}

function fetchMxFacilitiesNear(lat,lng,el){
  // Use Overpass API to find aviation maintenance facilities near the GPS point
  var radiusM=80000; // 80km radius
  var query='[out:json][timeout:20];('
    +'node["aeroway"="terminal"]["iata"](around:'+radiusM+','+lat+','+lng+');'
    +'node["aeroway"="aerodrome"](around:'+radiusM+','+lat+','+lng+');'
    +');out body 20;';

  // Primary: use Overpass for airports near location, then build from that
  fetch('https://overpass-api.de/api/interpreter?data='+encodeURIComponent(query),{cache:'no-store'})
    .then(function(r){return r.json();})

        return;

      _mxFacilitiesCache=el.innerHTML;
    })
    .catch(function(){
      el.innerHTML=renderMxFacilitiesFallback(lat,lng);
    });
}

function haversineNM(lat1,lng1,lat2,lng2){
  var R=3440.065; // nautical miles
  var dLat=(lat2-lat1)*Math.PI/180;
  var dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))*10)/10;
}

// Build squawk report text shared by PDF and email
function buildSquawkReport(sq){
  if(!sq)sq=S.squawks||[];
  var open=sq.filter(function(s){return s.status!=='closed';});
  var date=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  var lines=[
    'SQUAWK REPORT',
    'Aircraft: '+(S.ac.tail||'N/A')+' — '+(S.ac.make||'')+' '+(S.ac.model||''),
    'Engine type: '+esc(S.ac.engine||'N/A'),
    'Date: '+date,
    'Prepared by: '+(S.pilot.name||'N/A'),
    '══════════════════════════════════',
    'OPEN SQUAWKS ('+open.length+')',
    '══════════════════════════════════',
  ];
  open.forEach(function(s,i){
    lines.push('');
    lines.push((i+1)+'. '+s.desc);
    lines.push('   System: '+s.system);
    lines.push('   Severity: '+s.severity.toUpperCase());
    if(s.mel)lines.push('   MEL Ref: '+s.mel);
    lines.push('   Reported: '+s.date);
  });
  if(!open.length)lines.push('No open squawks.');
  lines.push('');
  lines.push('══════════════════════════════════');
  lines.push('Generated by Volanti');
  return lines.join('\n');
}

    +'<button onclick="saveDebrief()" class="btn bna" style="width:100%;padding:13px;font-size:13px;font-weight:700;margin-top:14px">✓ Log flight</button>'
  +'</div>';
  document.getElementById('app').appendChild(ov);
}
function calcDebriefTime(){
  var out=parseFloat(($('dbr-hobs')||{}).value)||0;
  var inV=parseFloat(($('dbr-hobi')||{}).value)||0;
  var t=inV>out?Math.round((inV-out)*10)/10:0;
  var el=$('dbr-time-lbl');
  if(el)el.textContent=Math.floor(t)+':'+(Math.round((t%1)*60)).toString().padStart(2,'0')+' hrs';
}
function saveDebrief(){
  var dep=($('dbr-dep')||{}).value||'';
  var arr=($('dbr-arr')||{}).value||'';
  var hobsOut=parseFloat(($('dbr-hobs')||{}).value)||0;
  var hobsIn=parseFloat(($('dbr-hobi')||{}).value)||0;
  var fuelAdded=parseFloat(($('dbr-fuel')||{}).value)||0;
  var nightHrs=parseFloat(($('dbr-night')||{}).value)||0;
  var notes=($('dbr-notes')||{}).value||'';
  var hobsTime=hobsIn>hobsOut?Math.round((hobsIn-hobsOut)*10)/10:0;
  if(hobsTime<=0){showToast('Enter Hobbs in/out to calculate flight time','error');return;}
  var today=new Date().toISOString().slice(0,10);
  var timeStr=Math.floor(hobsTime)+':'+(Math.round((hobsTime%1)*60)).toString().padStart(2,'0');
  if(!S.logbook)S.logbook=[];
  S.logbook.push({date:today,from:dep,to:arr,time:hobsTime,pic:hobsTime,ac:S.ac.tail,notes:notes,hobbsOut:hobsOut,hobbsIn:hobsIn});
  S.totalHours=Math.round((S.totalHours+hobsTime)*10)/10;
  // hobbsTotal = use hobbsIn directly if set (most accurate), else accumulate
  if(hobsIn>0) S.hobbsTotal=Math.round(hobsIn*10)/10;
  else S.hobbsTotal=Math.round((S.hobbsTotal+hobsTime)*10)/10;
  S.picHours=Math.round((S.picHours+hobsTime)*10)/10;
  S.nightHours=Math.round((S.nightHours+nightHrs)*10)/10;
  S.oilHrs=Math.round(((S.oilHrs||0)+hobsTime)*10)/10;
  // Pre-fill billing
  S.draftItems=[];
  if(fuelAdded>0)S.draftItems.push({cat:'Fuel',desc:'Fuel at '+(arr||'destination')+' ('+fuelAdded+' '+S.ac.fuelUnit+')',qty:fuelAdded,unit:S.fuelPrice||6.5,currency:'USD'});
  saveState();
  var ov=document.querySelector('div[style*="z-index:9998"]');if(ov)ov.remove();
  showToast('Flight logged! '+timeStr+' hrs'+(fuelAdded>0?' · Opening billing':''),'ok');
  if(fuelAdded>0)setTimeout(function(){S.bilTab='new';go('billing');},600);
}

function calcCharterTotal(){
  var hrs=parseFloat(($('ci-hrs')||{}).value)||0,rate=parseFloat(($('ci-rate')||{}).value)||0;
  var fuel=parseFloat(($('ci-fuel')||{}).value)||0,extra=parseFloat(($('ci-extra')||{}).value)||0;
  var sub=Math.round(hrs*rate*100)/100,total=sub+fuel+extra;
  var e;if((e=$('ci-sub')))e.textContent='$'+sub.toLocaleString('en-US',{minimumFractionDigits:2});
  if((e=$('ci-fsub')))e.textContent='$'+(fuel+extra).toLocaleString('en-US',{minimumFractionDigits:2});
  if((e=$('ci-total')))e.textContent='$'+total.toLocaleString('en-US',{minimumFractionDigits:2});
}
function emailCharterInvoice(){
  var client=($('ci-client')||{}).value||'Client',date=($('ci-date')||{}).value||'',route=($('ci-route')||{}).value||'';
  var hrs=($('ci-hrs')||{}).value||'0',rate=($('ci-rate')||{}).value||'0',fuel=($('ci-fuel')||{}).value||'0',extra=($('ci-extra')||{}).value||'0',num=($('ci-num')||{}).value||'';
  var total=(parseFloat(hrs)*parseFloat(rate))+parseFloat(fuel)+parseFloat(extra);
  var subject=encodeURIComponent('Charter Invoice '+num+' — '+S.ac.tail);
  var body=encodeURIComponent('CHARTER FLIGHT INVOICE\nInvoice: '+num+'\nDate: '+date+'\nAircraft: '+S.ac.tail+' ('+S.ac.make+' '+S.ac.model+')\nClient: '+client+'\nRoute: '+route+'\n──────────────────────\nFlight time: '+hrs+'h × $'+rate+'/hr = $'+(parseFloat(hrs)*parseFloat(rate)).toLocaleString()+'\n'+(parseFloat(fuel)>0?'Fuel/fees: $'+(parseFloat(fuel)+parseFloat(extra)).toLocaleString()+'\n':'')+'──────────────────────\nTOTAL: $'+total.toLocaleString('en-US',{minimumFractionDigits:2})+' USD\n\nThank you for flying with '+S.ac.tail+'.');
  window.open('mailto:?subject='+subject+'&body='+body,'_blank');showToast('Charter invoice email opened','ok');
}

function getActiveCL(){return S.activeCL||S.extractedCL||CL;}

function initActiveCL(){
  var src=S.extractedCL||CL;
  S.activeCL={};
  Object.keys(src).forEach(function(k){
    S.activeCL[k]={t:src[k].t,type:src[k].type,items:src[k].items.map(function(it){return {l:it.l,s:it.s};})};
  });
}

function enterEditMode(){if(!S.activeCL)initActiveCL();S.editMode=true;go('lists');}
function exitEditMode(){S.editMode=false;go('lists');}

function editItemField(sec,idx,field,val){
  if(S.activeCL&&S.activeCL[sec]&&S.activeCL[sec].items[idx]){
    S.activeCL[sec].items[idx][field]=val;
    saveState();
  }
}
function editSectionTitle(sec,val){if(S.activeCL&&S.activeCL[sec])S.activeCL[sec].t=val;}

function addClItem(sec){
  if(!S.activeCL)initActiveCL();
  if(!S.activeCL[sec])return;
  S.activeCL[sec].items.push({l:'New item',s:'Required action'});
  saveState();go('lists');
}
function deleteClItem(sec,idx){
  if(!S.activeCL||!S.activeCL[sec])return;
  S.activeCL[sec].items.splice(idx,1);saveState();go('lists');
}
function addClSection(type){
  if(!S.activeCL)initActiveCL();
  var id='custom-'+Date.now();
  S.activeCL[id]={t:type==='emergency'?'New emergency procedure':'New checklist phase',type:type||'normal',items:[]};
  S.clSection=id;saveState();go('lists');
}
function deleteClSection(sec){
  if(!S.activeCL||!S.activeCL[sec])return;
  delete S.activeCL[sec];
  var keys=Object.keys(S.activeCL);
  S.clSection=keys.length?keys[0]:'preflight';
  saveState();go('lists');
}

// Haversine distance in NM
function navDist(la1,lo1,la2,lo2){
  var R=3440.065,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
  var a=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)*Math.sin(dLo/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function navBrg(la1,lo1,la2,lo2){
  var y=Math.sin((lo2-lo1)*Math.PI/180)*Math.cos(la2*Math.PI/180);
  var x=Math.cos(la1*Math.PI/180)*Math.sin(la2*Math.PI/180)-Math.sin(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.cos((lo2-lo1)*Math.PI/180);
  return ((Math.atan2(y,x)*180/Math.PI)+360)%360;
}

// ── initMap replacement → navInitEFB ─────────────────────────────
function initMap(){
  // Cancel any previous nav animation
  if(NAV._raf){cancelAnimationFrame(NAV._raf);NAV._raf=null;}
  if(NAV._interval){clearInterval(NAV._interval);NAV._interval=null;}

  // Start UTC clock
  navUpdateUTCEFB();
  NAV._interval=setInterval(navUpdateUTCEFB,10000);

  // Start sim
  if(NAV.useSim) navStartSim();

  // Start sensors if permitted
  navStartSensors();

  // Initialize the right view
  if(NAV.view==='MAP'){
    setTimeout(navInitMapView,80);
  } else if(NAV.view==='PFD'){
    setTimeout(navInitPFD,80);
    if(NAV.showInset) setTimeout(navInitInsetMap,200);
  } else if(NAV.view==='SIXPACK'){
    setTimeout(navInitSixPack,80);
  }

  // Check online status
  NAV.isOffline=!navigator.onLine;
}

function navUpdateUTCEFB(){
  var el=$('nav-utc-efb');
  if(el){var n=new Date();el.textContent=n.toUTCString().match(/(\d\d:\d\d)/)[1]||'--:--';}
}

// ── Simulation ────────────────────────────────────────────────────
function navStartSim(){
  if(NAV._simInt) clearInterval(NAV._simInt);
  NAV._simInt=setInterval(function(){
    NAV._simT+=0.05;
    var t=NAV._simT;
    NAV.sim.pitch=Math.sin(t*0.7)*3;
    NAV.sim.roll=Math.cos(t*0.4)*8;
    NAV.sim.trk=(NAV.sim.trk+0.02)%360;
    NAV.sim.vs=-200+Math.sin(t*0.3)*300;
    // Gentle drift
    NAV.sim.lat+=Math.cos(NAV.sim.trk*Math.PI/180)*0.00008;
    NAV.sim.lng+=Math.sin(NAV.sim.trk*Math.PI/180)*0.00010;
    // Add breadcrumb
    var last=NAV.trail[NAV.trail.length-1];
    if(!last||navDist(last.lat,last.lng,NAV.sim.lat,NAV.sim.lng)>0.02){
      NAV.trail.push({lat:NAV.sim.lat,lng:NAV.sim.lng});
      if(NAV.trail.length>300) NAV.trail.shift();
    }
    // Update bottom bar
    navUpdateHUD();
    // Update map markers
    if(NAV._plane) navUpdateMapMarker();
  },50);
}

// ── Sensors ───────────────────────────────────────────────────────
function navStartSensors(){
  // GPS watch
  if(navigator.geolocation&&!NAV._gpsWatch){
    NAV._gpsWatch=navigator.geolocation.watchPosition(function(pos){
      NAV.real.lat=pos.coords.latitude;
      NAV.real.lng=pos.coords.longitude;
      NAV.real.alt=(pos.coords.altitude||0)*3.28084;
      NAV.real.spd=(pos.coords.speed||0)*1.94384;
      NAV.real.trk=pos.coords.heading||0;
    },function(){},{enableHighAccuracy:true,maximumAge:500});
  }
}

function navRequestSensors(){
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(function(r){
      if(r==='granted'){
        NAV.hasPerm=true;
        window.addEventListener('deviceorientation',function(e){
          if(e.beta!==null){NAV.real.pitch=e.beta||0;NAV.real.roll=e.gamma||0;}
          if(e.alpha!==null){NAV.real.hdg=(360-(e.alpha||0))%360;}
        });
        showToast('Motion sensors active','ok');
      }
    }).catch(function(){showToast('Sensor access denied','error');});
  } else {
    NAV.hasPerm=true;
    showToast('Sensors available (no permission required)','ok');
  }
  NAV.useSim=false;
  go('navscreen');
}

function navToggleSim(){
  NAV.useSim=!NAV.useSim;
  if(NAV.useSim) navStartSim();
  go('navscreen');
}

function navStopAll(){
  if(NAV._raf){cancelAnimationFrame(NAV._raf);NAV._raf=null;}
  if(NAV._interval){clearInterval(NAV._interval);NAV._interval=null;}
  if(NAV._simInt){clearInterval(NAV._simInt);NAV._simInt=null;}
  if(NAV._gpsWatch){navigator.geolocation.clearWatch(NAV._gpsWatch);NAV._gpsWatch=null;}
  if(NAV._map){try{NAV._map.remove();}catch(e){}NAV._map=null;}
  if(NAV._insetMap){try{NAV._insetMap.remove();}catch(e){}NAV._insetMap=null;}
  NAV._plane=null;NAV._insetPlane=null;NAV._route=null;NAV._trailLine=null;NAV._wptLayer=null;NAV._poiLayer=null;
}

// Pause SIM when app is backgrounded (battery saving)
document.addEventListener('visibilitychange',function(){
  if(document.hidden){
    if(NAV._simInt){clearInterval(NAV._simInt);NAV._simInt=null;NAV._simPaused=true;}
  } else {
    if(NAV._simPaused&&NAV.useSim){NAV._simPaused=false;navStartSim();}
  }
});

// ── HUD update ────────────────────────────────────────────────────
function navUpdateHUD(){
  var d=navCurr();
  var gs=$('nav-gs'),trk=$('nav-trk'),alt=$('nav-alt-bar');
  if(gs)gs.textContent=Math.round(d.spd);
  if(trk)trk.textContent=Math.round(d.trk).toString().padStart(3,'0');
  if(alt)alt.textContent=Math.round(d.alt);
}

// ── Map View ──────────────────────────────────────────────────────
function navInitMapView(){
  var el=$('navmap');if(!el)return;
  if(NAV._map){try{NAV._map.remove();}catch(e){}NAV._map=null;}
  var d=navCurr();
  try{
    var m=L.map('navmap',{zoomControl:true,attributionControl:false,preferCanvas:true}).setView([d.lat,d.lng],10);
    NAV._map=m;
    navSetMapTiles();
    // Plane marker
    NAV._plane=L.marker([d.lat,d.lng],{
      icon:L.divIcon({html:'<svg width="42" height="42" viewBox="0 0 24 24"><path d="M12 2L2 22L12 18L22 22Z" fill="#0BA5B0" stroke="#fff" stroke-width="1.5"/></svg>',className:'',iconSize:[42,42],iconAnchor:[21,21]}),
      zIndexOffset:1000
    }).addTo(m);
    // POIs
    navAddPOIs();
    // Existing route if any
    navDrawMapRoute();
    // Context menu: right-click adds waypoint
    m.on('contextmenu',function(e){navAddWptAt(e.latlng.lat,e.latlng.lng);});
  }catch(e){}
}

function navSetMapTiles(){
  if(!NAV._map)return;
  if(NAV._mapLayer){try{NAV._map.removeLayer(NAV._mapLayer);}catch(e){}NAV._mapLayer=null;}
  var urls={
    street:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    sectional:'https://vfrmap.com/current/tiles/vfrc/{z}/{x}/{y}.jpg',
    ifr:'https://vfrmap.com/current/tiles/ifrlc/{z}/{x}/{y}.jpg',
    satellite:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  };

function navAddPOIs(){
  if(!NAV._map)return;
  if(NAV._poiLayer){try{NAV._map.removeLayer(NAV._poiLayer);}catch(e){}NAV._poiLayer=null;}
  var group=L.layerGroup();
  NAV_APTS.concat(Object.keys(APTS).map(function(k){return{id:k,lat:APTS[k].lat,lng:APTS[k].lng,type:'APT',name:k};})).forEach(function(apt){
    if(!apt.lat||!apt.lng)return;
    var isVFR=apt.type==='VFR';
    var icon=L.divIcon({
      html:'<div style="background:'+(isVFR?'#d946ef':'#1d4ed8')+';border:2px solid #fff;border-radius:50%;width:12px;height:12px;box-shadow:0 2px 6px rgba(0,0,0,.6)"></div>',
      className:'',iconSize:[12,12],iconAnchor:[6,6]
    });
    var marker=L.marker([apt.lat,apt.lng],{icon:icon});
    marker.bindTooltip('<div style="font-family:monospace;font-weight:800;font-size:11px;color:'+(isVFR?'#d946ef':'#60a5fa')+'">'+apt.id+'</div>',{permanent:true,direction:'top',offset:[0,-8],className:'nav-poi-label'});
    if(!isVFR) marker.on('click',function(){navSelectApt(apt);});
    marker.addTo(group);
  });
  NAV._poiLayer=group;group.addTo(NAV._map);
}

function navUpdateMapMarker(){
  var d=navCurr();
  if(!NAV._plane||!NAV._map)return;
  NAV._plane.setLatLng([d.lat,d.lng]);
  var el=NAV._plane.getElement();
  if(el&&el.firstElementChild)el.firstElementChild.style.transform='rotate('+(d.trk||0)+'deg)';
  // Update trail
  if(NAV.trail.length>1){
    if(NAV._trailLine){try{NAV._map.removeLayer(NAV._trailLine);}catch(e){}}
    NAV._trailLine=L.polyline(NAV.trail.map(function(p){return[p.lat,p.lng];}),{color:'rgba(255,255,255,.4)',weight:2,dashArray:'3,6'}).addTo(NAV._map);
  }
  // Weather layer toggle
  if(NAV.showWx&&!NAV._wxLayer){
    NAV._wxLayer=L.tileLayer('https://tilecache.rainviewer.com/v2/radar/nowcast/256/{z}/{x}/{y}/2/1_1.png',{opacity:0.55}).addTo(NAV._map);
  } else if(!NAV.showWx&&NAV._wxLayer){
    try{NAV._map.removeLayer(NAV._wxLayer);}catch(e){}NAV._wxLayer=null;
  }
}

function navToggleMapLayer(){

}

function navDrawMapRoute(){
  if(!NAV._map)return;
  if(NAV._route){try{NAV._map.removeLayer(NAV._route);}catch(e){}NAV._route=null;}
  if(NAV._wptLayer){try{NAV._map.removeLayer(NAV._wptLayer);}catch(e){}NAV._wptLayer=null;}
  var f=APTS[S.pfFrom]||NAV_APTS.find(function(a){return a.id===S.pfFrom;})||null;
  var t=APTS[S.pfTo]||NAV_APTS.find(function(a){return a.id===S.pfTo;})||null;
  if(f&&t&&f.lat&&t.lat){
    NAV._route=L.polyline([[f.lat,f.lng],[t.lat,t.lng]],{color:'#d946ef',weight:3,dashArray:'none',opacity:0.85}).addTo(NAV._map);
    NAV._map.fitBounds([[f.lat,f.lng],[t.lat,t.lng]],{padding:[50,50]});
    var grp=L.layerGroup();
    [{id:S.pfFrom,lat:f.lat,lng:f.lng},{id:S.pfTo,lat:t.lat,lng:t.lng}].forEach(function(wp){
      L.marker([wp.lat,wp.lng],{icon:L.divIcon({html:'<div style="background:#d946ef;border:2px solid #fff;border-radius:50%;width:10px;height:10px"></div>',className:'',iconSize:[10,10],iconAnchor:[5,5]})}).addTo(grp);
    });
