    +'</div>'
    +'<div style="display:flex;gap:2px;margin-bottom:10px">'
      +MONTH_NAMES.map(function(m,mi){
        var isCur=mi===now.getMonth()&&f.year===now.getFullYear();
        return '<div style="flex:1;text-align:center;font-size:8px;font-weight:'+(isCur?'800':'500')+';color:'+(isCur?'var(--teal)':'var(--t3)')+'">'+m.charAt(0)+'</div>';
      }).join('')
    +'</div>'
    +'<button onclick="S.bilTab=\'expenses\';nav(\'billing\')" style="width:100%;padding:8px;background:transparent;border:.5px solid var(--bd);border-radius:8px;font-size:11px;font-weight:600;color:var(--t2);cursor:pointer;font-family:inherit">All expenses & filters →</button>'
  +'</div>';
}

// ═══ OWNER EXPENSE SPLIT WIDGET ════════════════════════════════
function dashWidget_ownerExpenses(){
  var now = new Date();
  var thisYear  = now.getFullYear();
  var thisMonth = now.getMonth();

  // ── Gather all expense sources ────────────────────────────────
  var allExpenses = getAllExpenses();

  // ── Build owner list: only coOwners with owner roles ──────────
  var owners = (S.coOwners||[]).filter(function(o){
    return o.name && o.name.trim() &&
           (o.role==='owner_admin'||o.role==='owner_viewer'||!o.role);
  }).map(function(o){return {name:o.name.trim(), share:parseFloat(o.share)||0};});

  // If no co-owners set up, fall back to pilot only
  if(!owners.length){
    owners=[{name:(S.pilot.name||'You').trim(), share:100}];
  }

  // ── Compute monthly + annual totals per owner ─────────────────
  function ownerMatch(expOwner, ownerName){
    if(!expOwner) return false;
    return expOwner.toLowerCase().trim() === ownerName.toLowerCase().trim();
  }

  var ownerColors = ['#0BA5B0','#6366F1','#F59E0B','#22C55E','#EF4444','#EC4899'];

  var ownerData = owners.map(function(o, idx){
    var monthly = 0, annual = 0;
    allExpenses.forEach(function(e){
      if(!e.date) return;
      var d = new Date(e.date);
      if(isNaN(d)) return;
      var match = ownerMatch(e.owner, o.name);
      if(!e.owner && owners.length===1) match=true;
      if(match){
        if(d.getFullYear()===thisYear) annual += e.amount;
        if(d.getFullYear()===thisYear && d.getMonth()===thisMonth) monthly += e.amount;
      }
    });
    return {name:o.name, share:o.share, monthly:monthly, annual:annual, color:ownerColors[idx%ownerColors.length]};
  });

  var totalMonthly = ownerData.reduce(function(s,o){return s+o.monthly;},0);
  var totalAnnual  = ownerData.reduce(function(s,o){return s+o.annual;},0);

  // If everything is zero but there are expenses (owner names don't match),
  // put all expenses under "Aircraft Total" only
  if(totalMonthly===0 && totalAnnual===0 && allExpenses.length>0){
    allExpenses.forEach(function(e){
      if(!isNaN(e.date)){
        if(e.date.getFullYear()===thisYear) totalAnnual += e.amount;
        if(e.date.getFullYear()===thisYear && e.date.getMonth()===thisMonth) totalMonthly += e.amount;
      }
    });
  }

  var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var hasData = totalAnnual > 0 || allExpenses.length > 0;

  function fmt(n){ return '$'+Math.round(n).toLocaleString(); }
  function bar(val, max, color){
    var pct = max>0 ? Math.max(val>0?3:0, Math.round(val/max*100)) : 0;
    return '<div style="flex:1;height:5px;background:var(--bd);border-radius:3px;overflow:hidden">'
      +'<div style="width:'+pct+'%;height:100%;background:'+color+';border-radius:3px;transition:width .4s"></div>'
    +'</div>';
  }

  // ── Empty state ───────────────────────────────────────────────
  if(!hasData){
    return '<div class="card">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
        +'<div class="seclbl" style="margin:0">👥 Owner expenses</div>'
        +'<button onclick="nav(\'billing\')" style="font-size:10px;background:none;border:none;color:var(--teal);cursor:pointer;font-weight:700;font-family:inherit;padding:0">Add report →</button>'
      +'</div>'
      +'<div style="text-align:center;padding:20px 0;color:var(--t3)">'
        +'<div style="font-size:26px;margin-bottom:8px">💳</div>'
        +'<div style="font-size:12px;font-weight:600;color:var(--t2);margin-bottom:4px">No expense reports yet</div>'
        +'<div style="font-size:11px;line-height:1.6">Add billing reports or import<br>expenses to track owner costs.</div>'
      +'</div>'
    +'</div>';
  }

  // ── Main widget ───────────────────────────────────────────────
  var html = '<div class="card" style="padding-bottom:14px">';

  // Header row
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'
    +'<div class="seclbl" style="margin:0">👥 Owner expenses</div>'
    +'<button onclick="nav(\'billing\')" style="font-size:10px;background:none;border:none;color:var(--teal);cursor:pointer;font-weight:700;font-family:inherit;padding:0">Details →</button>'
  +'</div>';

  // ── Period summary cards (Monthly | Annual) ───────────────────
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">'
    // This month
    +'<div style="background:var(--bg);border-radius:10px;padding:11px 12px;border:.5px solid var(--bd)">'
      +'<div style="font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">'+monthNames[thisMonth]+' '+thisYear+'</div>'
      +'<div style="font-size:22px;font-weight:900;color:var(--t1);line-height:1">'+fmt(totalMonthly)+'</div>'
      +'<div style="font-size:10px;color:var(--t3);margin-top:2px">This month</div>'
    +'</div>'
    // This year
    +'<div style="background:rgba(11,165,176,.08);border-radius:10px;padding:11px 12px;border:.5px solid rgba(11,165,176,.2)">'
      +'<div style="font-size:9px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">'+thisYear+' YTD</div>'
      +'<div style="font-size:22px;font-weight:900;color:var(--teal);line-height:1">'+fmt(totalAnnual)+'</div>'
      +'<div style="font-size:10px;color:var(--teal);margin-top:2px;opacity:.7">Year to date</div>'
    +'</div>'
  +'</div>';

  // ── Per-owner breakdown ───────────────────────────────────────
  html += '<div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Per owner breakdown</div>';

  // Column headers
  html += '<div style="display:grid;grid-template-columns:1fr auto auto;gap:8px;padding:0 4px;margin-bottom:4px">'
    +'<div style="font-size:9px;color:var(--t3);font-weight:700;letter-spacing:.04em">OWNER</div>'
    +'<div style="font-size:9px;color:var(--t3);font-weight:700;letter-spacing:.04em;text-align:right;min-width:56px">MONTH</div>'
    +'<div style="font-size:9px;color:var(--t3);font-weight:700;letter-spacing:.04em;text-align:right;min-width:60px">YTD</div>'
  +'</div>';

  ownerData.forEach(function(o){
    var hasAny = o.monthly>0 || o.annual>0;
    html += '<div style="display:flex;flex-direction:column;gap:3px;padding:8px 4px;border-top:.5px solid var(--bd)">'
      // Name + share + amounts row
      +'<div style="display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center">'
        +'<div style="display:flex;align-items:center;gap:6px;min-width:0">'
          +'<div style="width:9px;height:9px;border-radius:50%;background:'+o.color+';flex-shrink:0"></div>'
          +'<div style="font-size:12px;font-weight:700;color:'+(hasAny?'var(--t1)':'var(--t3)')+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(o.name)+'</div>'
          +(o.share>0?'<div style="font-size:9px;color:var(--t3);flex-shrink:0">'+o.share+'%</div>':'')
        +'</div>'
        +'<div style="font-size:12px;font-weight:700;color:'+(o.monthly>0?'var(--t1)':'var(--t3)')+';text-align:right;min-width:56px">'+(o.monthly>0?fmt(o.monthly):'—')+'</div>'
        +'<div style="font-size:12px;font-weight:800;color:'+(o.annual>0?o.color:'var(--t3)')+';text-align:right;min-width:60px">'+(o.annual>0?fmt(o.annual):'—')+'</div>'
      +'</div>'
      // Annual progress bar
      +(totalAnnual>0&&o.annual>0
        ?'<div style="display:flex;align-items:center;gap:6px">'
          +bar(o.annual, totalAnnual, o.color)
          +'<div style="font-size:9px;color:var(--t3);min-width:26px;text-align:right">'+Math.round(o.annual/totalAnnual*100)+'%</div>'
        +'</div>'
        :'')
    +'</div>';
  });

  // ── Aircraft total row ────────────────────────────────────────
  html += '<div style="display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:10px 4px;border-top:1.5px solid var(--bd);margin-top:2px">'
    +'<div style="font-size:12px;font-weight:800;color:var(--t1);display:flex;align-items:center;gap:6px">'
      +'<span style="font-size:13px">✈</span>'+esc(S.ac.tail||'Aircraft')+' Total'
    +'</div>'
    +'<div style="font-size:13px;font-weight:900;color:var(--t1);text-align:right;min-width:56px">'+fmt(totalMonthly)+'</div>'
    +'<div style="font-size:13px;font-weight:900;color:var(--teal);text-align:right;min-width:60px">'+fmt(totalAnnual)+'</div>'
  +'</div>';

  html += '</div>'; // card
  return html;
}

// ═══ KPI BAR WIDGET — horizontal strip of all key metrics ═══════
function dashWidget_kpi_bar(){
  var now = new Date();
  var thisYear = now.getFullYear(), thisMonth = now.getMonth();
  var prevMonth = thisMonth===0?11:thisMonth-1;
  var prevMonthYear = thisMonth===0?thisYear-1:thisYear;
  var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  var totalHrs = S.totalHours||0;
  var hobbsTotal = S.hobbsTotal>0?S.hobbsTotal:(S.tapPrev>0?Math.round((S.tapPrev+S.tapHrs)*10)/10:totalHrs);
  var yearHrs=0,monthHrs=0,prevMonthHrs=0,lastYearHrs=0;
  (S.logbook||[]).forEach(function(f){
    var h=parseFloat(f.time||f.pic||0)||0; if(!f.date||!h)return;
    var d=new Date(f.date); if(isNaN(d))return;
    var y=d.getFullYear(),m=d.getMonth();
    if(y===thisYear){yearHrs+=h; if(m===thisMonth)monthHrs+=h;}
    if(y===thisYear-1)lastYearHrs+=h;
    if(y===prevMonthYear&&m===prevMonth)prevMonthHrs+=h;
  });
  var dueCount=0,overdueCount=0;
  (S.exps||[]).forEach(function(ex){
    if(!ex.date)return;
    var diff=Math.round((new Date(ex.date)-now)/86400000);
    if(diff<0)overdueCount++; else if(diff<=30)dueCount++;
  });
  var oilInterval=S.oilInterval||50, oilRem=Math.max(0,oilInterval-(S.oilHrs||0));
  var charterRev=0,charterMonth=0;
  (S.reports||[]).forEach(function(r){
    var a=parseFloat(r.totalUSD||r.totalCOP||r.total||0)||0; if(!a)return;
    charterRev+=a;
    if(r.date){var d=new Date(r.date);if(!isNaN(d)&&d.getFullYear()===thisYear&&d.getMonth()===thisMonth)charterMonth+=a;}
  });

  function delta(cur,prev){
    if(!prev)return null;
    var p=Math.round(Math.abs(cur-prev)/prev*100);
    return{up:cur>=prev,txt:(cur>=prev?'↑':'↓')+p+'%',color:cur>=prev?'#22c55e':'#ef4444'};
  }

  // Each tile: label, value, sub, delta, valueColor, onclick
  var tiles=[];

  // Hobbs
  tiles.push({label:'Hobbs',val:hobbsTotal.toFixed(1),sub:'engine hrs',d:null,vc:'var(--teal)',click:'showHobbsModal()'});

  // Month hours
  var md=delta(monthHrs,prevMonthHrs);
  tiles.push({label:MONTHS[thisMonth],val:monthHrs>0?monthHrs.toFixed(1):'—',sub:'hrs',d:md,vc:monthHrs>0?'var(--teal)':null,click:"nav('logs')"});

  // Year hours
  var yd=delta(yearHrs,lastYearHrs);
  tiles.push({label:thisYear+'',val:yearHrs>0?yearHrs.toFixed(1):'—',sub:'YTD',d:yd,vc:null,click:"nav('logs')"});

  // Compliance
  var compVal=overdueCount>0?String(overdueCount):dueCount>0?String(dueCount):'✓';
  var compSub=overdueCount>0?'overdue':dueCount>0?'due soon':'current';
  var compColor=overdueCount>0?'#ef4444':dueCount>0?'#f59e0b':'#22c55e';
  tiles.push({label:'Comply',val:compVal,sub:compSub,d:null,vc:compColor,click:"nav('logs')"});

  // Oil
  var oilColor=oilRem<10?'#ef4444':oilRem<20?'#f59e0b':null;
  tiles.push({label:'Oil',val:oilRem+'h',sub:'remain',d:null,vc:oilColor,click:'showOilModal()'});

  // Charter (only if there's revenue)
  if(charterRev>0){
    tiles.push({label:'Charter',val:'$'+Math.round(charterMonth).toLocaleString(),sub:'this mo.',d:null,vc:'#22c55e',click:"nav('billing')"});
  }

  // Co-owner tiles (first 2 if set up)
  var ownerMap={};
  (S.logbook||[]).forEach(function(f){
    var h=parseFloat(f.time||f.pic||0)||0;
    var name=(f.pilot||'').trim()||S.pilot.name||'';
    if(h&&name)ownerMap[name]=(ownerMap[name]||0)+h;
  });
  var owners=Object.keys(ownerMap).sort(function(a,b){return ownerMap[b]-ownerMap[a];});
  if(owners.length>1){
    owners.slice(0,2).forEach(function(name){
      tiles.push({label:name.split(' ')[0],val:(ownerMap[name]||0).toFixed(1),sub:'total hrs',d:null,vc:null,click:"nav('logs')"});
    });
  }

  // Build tile HTML
  var tileHTML = tiles.map(function(t){
    return '<div onclick="'+t.click+'" style="flex:1;min-width:0;padding:10px 6px 9px;cursor:pointer;display:flex;flex-direction:column;justify-content:space-between;border-right:.5px solid var(--bd)">'
      +'<div style="font-size:8px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px">'+t.label+'</div>'
      +'<div style="font-size:20px;font-weight:900;color:'+(t.vc||'var(--t1)')+';line-height:1;letter-spacing:-.5px">'+t.val+'</div>'
      +'<div style="display:flex;align-items:baseline;gap:3px;margin-top:4px">'
        +'<span style="font-size:9px;color:var(--t3)">'+t.sub+'</span>'
        +(t.d?'<span style="font-size:9px;font-weight:800;color:'+t.d.color+'">'+t.d.txt+'</span>':'')
      +'</div>'
    +'</div>';
  }).join('');

  return '<div class="card" style="padding:0;overflow:hidden">'
    +'<div style="display:flex;overflow-x:auto;scrollbar-width:none">'+tileHTML+'</div>'
  +'</div>';
}

// ═══ FLIGHT KPI WIDGET ══════════════════════════════════════════
function dashWidget_kpi(){
  var now=new Date();
  // Month boundaries
  var thisMonthStart=new Date(now.getFullYear(),now.getMonth(),1);
  var lastMonthStart=new Date(now.getFullYear(),now.getMonth()-1,1);
  var lastMonthEnd=new Date(now.getFullYear(),now.getMonth(),0);
  // Week boundaries (Mon-Sun)
  var dayOfWeek=now.getDay();var daysFromMon=(dayOfWeek+6)%7;
  var thisWeekStart=new Date(now);thisWeekStart.setDate(now.getDate()-daysFromMon);thisWeekStart.setHours(0,0,0,0);
  var lastWeekStart=new Date(thisWeekStart);lastWeekStart.setDate(thisWeekStart.getDate()-7);
  var lastWeekEnd=new Date(thisWeekStart);lastWeekEnd.setDate(thisWeekStart.getDate()-1);lastWeekEnd.setHours(23,59,59);

  function hoursInRange(from,to){
    return (S.logbook||[]).reduce(function(sum,entry){
      if(!entry.date)return sum;
      var d=new Date(entry.date);
      if(d>=from&&d<=to){
        return sum+(parseFloat(entry.duration||entry.totalTime||entry.hours||0)||0);
      }
      return sum;
    },0);
  }

  function expensesInRange(from,to){
    return (S.reports||[]).reduce(function(sum,r){
      if(!r.date)return sum;
      var d=new Date(r.date);
      if(d>=from&&d<=to){
        var amt=parseFloat((r.total||r.amount||'0').toString().replace(/[^0-9.]/g,''))||0;
        return sum+amt;
      }
      return sum;
    },0);
  }

  var hrsThisMonth=hoursInRange(thisMonthStart,now);
  var hrsLastMonth=hoursInRange(lastMonthStart,lastMonthEnd);
  var hrsThisWeek=hoursInRange(thisWeekStart,now);
  var hrsLastWeek=hoursInRange(lastWeekStart,lastWeekEnd);
  var expThisMonth=expensesInRange(thisMonthStart,now);
  var expLastMonth=expensesInRange(lastMonthStart,lastMonthEnd);
  var flightsThisMonth=(S.logbook||[]).filter(function(e){return e.date&&new Date(e.date)>=thisMonthStart;}).length;
  var flightsLastMonth=(S.logbook||[]).filter(function(e){return e.date&&new Date(e.date)>=lastMonthStart&&new Date(e.date)<=lastMonthEnd;}).length;

  function delta(curr,prev,unit,prefix){
    if(!prev&&!curr)return{txt:'No data',color:'var(--t3)'};
    if(!prev)return{txt:'New data',color:'var(--teal)'};
    var d=curr-prev;var pct=Math.abs(Math.round(d/prev*100));
    var up=d>=0;
    return{
      txt:(up?'↑':'↓')+' '+pct+'% vs last '+(unit||''),
      color:up?'var(--teal)':'#ef4444',raw:d,pct:pct
    };
  }

  function kpiCard(emoji,label,value,unit,deltaObj,subtitle){
    return'<div style="background:var(--bg);border-radius:12px;padding:12px;flex:1;min-width:0">'
      +'<div style="font-size:13px;margin-bottom:4px">'+emoji+'</div>'
      +'<div style="font-size:20px;font-weight:900;color:var(--t1);line-height:1">'+value+'<span style="font-size:11px;font-weight:600;color:var(--t3);margin-left:2px">'+unit+'</span></div>'
      +'<div style="font-size:10px;font-weight:700;color:var(--t3);margin-top:2px">'+label+'</div>'
      +(deltaObj?'<div style="font-size:9px;font-weight:700;color:'+deltaObj.color+';margin-top:4px;line-height:1.3">'+deltaObj.txt+'</div>':'')
      +(subtitle?'<div style="font-size:9px;color:var(--t3);margin-top:2px">'+subtitle+'</div>':'')
    +'</div>';
  }

  var hasData=(S.logbook&&S.logbook.length>0)||(S.reports&&S.reports.length>0);

  return'<div class="card">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
      +'<div class="seclbl" style="margin:0">📈 Flight KPIs</div>'
      +'<span style="font-size:10px;color:var(--t3)">'+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][now.getMonth()]+' '+now.getFullYear()+'</span>'
    +'</div>'
    +(!hasData
      ?'<div style="text-align:center;padding:16px;color:var(--t3)">'
        +'<div style="font-size:22px;margin-bottom:6px">📋</div>'
        +'<div style="font-size:12px;font-weight:600;color:var(--t2);margin-bottom:4px">No flight data yet</div>'
        +'<div style="font-size:11px;line-height:1.5">Log flights via the <b>🛬 Land</b> button or import your logbook in Maintenance → Logs.</div>'
      +'</div>'
      // Row 1: hours
      :'<div style="display:flex;gap:8px;margin-bottom:8px">'
        +kpiCard('✈','Hours this month',hrsThisMonth.toFixed(1),'hrs',delta(hrsThisMonth,hrsLastMonth,'month'),'')
        +kpiCard('🗓','Hours this week',hrsThisWeek.toFixed(1),'hrs',delta(hrsThisWeek,hrsLastWeek,'week'),'')
      +'</div>'
      // Row 2: expenses + flights
      +'<div style="display:flex;gap:8px;margin-bottom:8px">'
        +kpiCard('💰','Expenses this month','$'+Math.round(expThisMonth).toLocaleString(),'',delta(expThisMonth,expLastMonth,'month'),'')
        +kpiCard('🛫','Flights this month',flightsThisMonth,'flt',delta(flightsThisMonth,flightsLastMonth,'month'),'')
      +'</div>'
      // Cost per hour
      +(hrsThisMonth>0
        ?'<div style="background:var(--teal-l);border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center">'
          +'<div style="font-size:11px;font-weight:700;color:var(--teal-d)">Cost per flight hour this month</div>'
          +'<div style="font-size:16px;font-weight:900;color:var(--teal-d)">$'+Math.round(expThisMonth/hrsThisMonth).toLocaleString()+'/hr</div>'
        +'</div>'
        :'')
    )
    +'<button onclick="nav(\'logs\')" style="margin-top:10px;width:100%;padding:8px;background:transparent;border:.5px solid var(--bd);border-radius:8px;font-size:11px;font-weight:600;color:var(--t2);cursor:pointer;font-family:inherit">View flight logs →</button>'
  +'</div>';
}

function initDashSocialMap(){
  var el=document.getElementById('dash-social-map');
  var ph=document.getElementById('dash-map-placeholder');
  if(!el||!window.L)return;

  // Get user position
  function buildMini(lat,lng){
    if(ph)ph.style.display='none';
    try{
      var map=L.map(el,{zoomControl:false,attributionControl:false,dragging:false,scrollWheelZoom:false,touchZoom:false,doubleClickZoom:false,boxZoom:false,keyboard:false}).setView([lat,lng],10);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:18}).addTo(map);

      // My marker
      L.divIcon&&L.marker([lat,lng],{icon:L.divIcon({html:'<div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#0BA5B0,#0284C7);border:2.5px solid #fff;box-shadow:0 2px 8px rgba(11,165,176,.5);display:flex;align-items:center;justify-content:center;font-size:14px">'+(S.ac.photo?'<img src="'+S.ac.photo+'" style="width:100%;height:100%;border-radius:50%;object-fit:cover">':'✈')+'</div>',className:'',iconAnchor:[16,16]})}).addTo(map);

      // Nearby pilot markers
      DEMO_PILOTS.forEach(function(p){
        if(!p.online)return;
        var plat=lat+(p.lat-25.9),plng=lng+(p.lng-(-80.3));
        var col=p.status==='flying'?'#22C55E':'#60a5fa';
        var icon=L.divIcon({html:'<div style="width:26px;height:26px;border-radius:50%;background:#fff;border:2.5px solid '+col+';display:flex;align-items:center;justify-content:center;font-size:12px;box-shadow:0 1px 6px rgba(0,0,0,.2)">'+p.emoji+'</div>',className:'',iconAnchor:[13,13]});
        L.marker([plat,plng],{icon:icon}).addTo(map).on('click',function(){showPilotCard(p.id);});
      });

      // Click map to open full social
      el.addEventListener('click',function(){nav('social');},true);
      // Overlay label
      var lbl=document.createElement('div');
      lbl.style.cssText='position:absolute;top:8px;left:8px;z-index:800;background:rgba(0,0,0,.5);color:#fff;font-size:10px;font-weight:700;padding:4px 8px;border-radius:20px;pointer-events:none;backdrop-filter:blur(4px)';
      lbl.textContent='📡 Pilot Network — tap to explore';
      el.appendChild(lbl);
    }catch(e){}
  }

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      function(pos){buildMini(pos.coords.latitude,pos.coords.longitude);},
      function(){buildMini(25.9,-80.3);},
      {timeout:3000,maximumAge:300000}
    );
  } else {
    buildMini(25.9,-80.3);
  }
}

    try{ go('login'); }catch(e2){}
  }
  setTimeout(runDailyChecks, 2000);
  if(window.matchMedia){
    window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',function(){
      if(S.settings&&S.settings.theme==='system') applyTheme('system');
    });
  }
})();
</script>
